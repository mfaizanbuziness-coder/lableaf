<meta name="description" content="Free semester-wise study material, practical books, MCQ banks, and 1-on-1 guidance for MLT students in Pakistan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-dark:#085041;--teal-light:#1D9E75;--teal-mid:#5DCAA5;--teal-pale:#E1F5EE;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-mid:#EF9F27;
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-bdr:#97C459;
  --book-bg:#F0EEFF;--book-text:#4B45B2;--book-bdr:rgba(75,69,178,0.2);
  --ink:#1a1a1a;--ink-light:#3d3d3d;--muted:#6b7280;--surface:#f9f7f4;--white:#ffffff;
  --border:rgba(15,110,86,0.13);
  --shadow-sm:0 2px 12px rgba(15,110,86,0.07);--shadow-md:0 8px 32px rgba(15,110,86,0.10);--shadow-lg:0 16px 48px rgba(15,110,86,0.13);
  --radius-sm:8px;--radius-md:12px;--radius-lg:20px;--radius-xl:28px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);overflow-x:hidden;line-height:1.6;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
h1,h2,h3{font-family:'DM Serif Display',serif;line-height:1.15}
p{line-height:1.7}
nav{position:sticky;top:0;z-index:200;background:rgba(249,247,244,0.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--teal);display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nav-links{display:flex;gap:1.75rem;align-items:center;list-style:none}
.nav-links a{text-decoration:none;color:var(--ink-light);font-size:0.875rem;font-weight:500;transition:color 0.2s}
.nav-links a:hover{color:var(--teal)}
.btn-nav{background:var(--teal)!important;color:white!important;padding:9px 22px;border-radius:999px;font-size:0.875rem;font-weight:600;transition:background 0.2s,transform 0.2s!important;display:inline-flex;align-items:center;gap:6px}
.btn-nav:hover{background:var(--teal-light)!important;transform:translateY(-1px)}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px;font-size:22px;color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--teal);color:white}
.btn-primary:hover{background:var(--teal-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-reagent{background:var(--amber-light);color:var(--amber);border:2px solid var(--amber-mid)}
.btn-reagent:hover{background:#FAC775;transform:translateY(-2px);box-shadow:0 8px 24px rgba(186,117,23,0.2)}
.badge{display:inline-flex;align-items:center;gap:7px;background:var(--teal-pale);color:var(--teal);border:1px solid rgba(15,110,86,0.2);border-radius:999px;padding:6px 16px;font-size:0.72rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--teal-light);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
.tag{background:var(--teal-pale);color:var(--teal);font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:999px}
.tag-green{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-bdr);font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:999px}
.container{max-width:1120px;margin:0 auto;padding:0 2.5rem}
.section{padding:6rem 0}
.divider{height:1px;background:var(--border);max-width:1120px;margin:0 auto}
.section-eyebrow{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal);margin-bottom:0.75rem}
.section-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,4vw,2.8rem);color:var(--ink);margin-bottom:1rem}
.section-sub{font-size:1rem;color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:3rem}

/* HERO */
.hero{min-height:92vh;display:flex;align-items:center;padding:5rem 2.5rem 4rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 55% at 80% 38%,rgba(29,158,117,0.09) 0%,transparent 68%),radial-gradient(ellipse 45% 60% at 8% 78%,rgba(239,159,39,0.07) 0%,transparent 55%)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;max-width:1120px;margin:0 auto;align-items:center;position:relative;z-index:1;width:100%}
.hero-left>*{animation:fadeUp 0.65s ease both}
.hero-left>*:nth-child(1){animation-delay:0.05s}.hero-left>*:nth-child(2){animation-delay:0.15s}.hero-left>*:nth-child(3){animation-delay:0.25s}.hero-left>*:nth-child(4){animation-delay:0.35s}.hero-left>*:nth-child(5){animation-delay:0.45s}
.hero-visual{animation:fadeUp 0.8s 0.2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.hero h1{font-size:clamp(2.6rem,5vw,4.2rem);color:var(--ink);margin:1.25rem 0 1.5rem}
.hero h1 em{font-style:italic;color:var(--teal)}
.hero-desc{font-size:1.1rem;color:var(--muted);line-height:1.75;margin-bottom:2.25rem;max-width:490px}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap}
.hero-stats{display:flex;gap:2.5rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid var(--border);flex-wrap:wrap}
.stat-num{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--teal);display:block;line-height:1}
.stat-lbl{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-top:4px;display:block}
.hero-card-wrap{position:relative;max-width:420px;margin:0 auto}
.hero-card-shadow{position:absolute;top:-14px;left:22px;right:-14px;bottom:0;background:var(--teal-pale);border:1px solid rgba(15,110,86,0.12);border-radius:18px;z-index:0}
.hero-card{position:relative;z-index:1;background:var(--white);border-radius:18px;padding:1.5rem 1.75rem;border:1px solid var(--border);box-shadow:var(--shadow-md)}
.hc-label{font-size:0.68rem;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:var(--teal);margin-bottom:0.75rem}
.hc-title{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--ink);margin-bottom:0.6rem}
.hc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:0.75rem}
.hc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:0.8rem;color:var(--muted)}
.float-card{position:absolute;background:white;border:1px solid var(--border);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow-sm);font-size:0.78rem;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:8px;animation:float 4s ease-in-out infinite;white-space:nowrap}
.float-card.fc-1{top:-20px;right:-30px;animation-delay:0s}.float-card.fc-2{bottom:-10px;left:-20px;animation-delay:1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* FEATURES */
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem}
.feature-card{background:var(--white);border-radius:var(--radius-lg);padding:2rem 1.75rem;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:transform 0.22s,box-shadow 0.22s}
.feature-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.feature-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:1.25rem}
.feature-card h3{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--ink);margin-bottom:0.6rem}
.feature-card p{font-size:0.9rem;color:var(--muted);line-height:1.7}

/* SEMESTERS */
.sem-grid{display:grid;gap:1rem;margin-bottom:2.5rem}
.sem-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all 0.22s;position:relative;overflow:visible}
.sem-card:hover{border-color:var(--teal-mid);background:var(--teal-pale);transform:translateY(-3px);box-shadow:var(--shadow-md)}
.sem-card.active{border-color:var(--teal);background:var(--teal-pale);box-shadow:0 0 0 3px rgba(15,110,86,0.12)}
.sem-num{font-family:'DM Serif Display',serif;font-size:2.4rem;color:var(--teal);display:block;line-height:1;margin-bottom:4px}
.sem-lbl{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.sem-subjects{font-size:0.7rem;color:var(--teal);margin-top:6px;font-weight:500}
.new-badge{position:absolute;top:-8px;right:-8px;background:var(--teal);color:white;font-size:0.55rem;font-weight:700;padding:3px 7px;border-radius:999px;letter-spacing:0.05em;text-transform:uppercase}
.sem-panel{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:2rem 2.5rem;display:none}
.sem-panel.visible{display:block;animation:fadeUp 0.3s ease}
.sem-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.sem-panel-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink)}
.resource-list{display:flex;flex-direction:column;gap:0.6rem}

/* SUBJECT CARDS */
.subject-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;transition:box-shadow 0.2s}
.subject-card:hover{box-shadow:var(--shadow-md)}
.subject-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;transition:background 0.2s;user-select:none}
.subject-header:hover{background:var(--teal-pale)}
.subject-header.open{background:var(--teal-pale);border-bottom:1px solid var(--border)}
.subject-left{display:flex;align-items:center;gap:12px}
.subject-icon{font-size:20px;flex-shrink:0}
.subject-name{font-size:0.92rem;font-weight:600;color:var(--ink);display:block}
.subject-desc{font-size:0.73rem;color:var(--muted);margin-top:1px}
.subject-chevron{font-size:0.75rem;color:var(--muted);transition:transform 0.25s;flex-shrink:0;margin-left:8px}
.subject-header.open .subject-chevron{transform:rotate(180deg)}
.subject-links{display:none;padding:0.75rem 1rem 0.85rem;background:var(--surface)}
.subject-links.open{display:block;animation:fadeUp 0.2s ease}
.sublink-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:0.5rem}

/* SUBLINKS */
.sublink{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:var(--radius-sm);font-size:0.8rem;font-weight:500;text-decoration:none;transition:all 0.18s;border:1px solid transparent;position:relative;overflow:hidden}
.sublink::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.18s;border-radius:var(--radius-sm)}
.sublink:hover::before{opacity:1}
.sublink-icon{font-size:14px;flex-shrink:0;transition:transform 0.2s}
.sublink:hover .sublink-icon{transform:scale(1.2)}

/* MCQ — Amber */
.sublink-mcq{background:var(--amber-light);color:var(--amber);border-color:rgba(186,117,23,0.2)}
.sublink-mcq:hover{background:#F5D49A;border-color:var(--amber-mid);transform:translateY(-1px);box-shadow:0 3px 10px rgba(186,117,23,0.15)}

/* Notes — Teal */
.sublink-notes{background:var(--teal-pale);color:var(--teal);border-color:var(--border)}
.sublink-notes:hover{background:#B8EDD8;border-color:var(--teal-mid);transform:translateY(-1px);box-shadow:0 3px 10px rgba(15,110,86,0.12)}

/* Practical — Green */
.sublink-practical{background:var(--green-bg);color:var(--green-text);border-color:rgba(59,109,17,0.15)}
.sublink-practical:hover{background:#CFECAD;border-color:var(--green-bdr);transform:translateY(-1px);box-shadow:0 3px 10px rgba(59,109,17,0.12)}

/* Viva — Purple */
.sublink-viva{background:#EEEDFE;color:#4B45B2;border-color:rgba(75,69,178,0.15)}
.sublink-viva:hover{background:#D5D3FA;border-color:#8B87D8;transform:translateY(-1px);box-shadow:0 3px 10px rgba(75,69,178,0.12)}

/* Books — Indigo with shimmer animation */
.sublink-books{background:var(--book-bg);color:var(--book-text);border-color:var(--book-bdr);animation:bookShimmer 3s ease-in-out infinite}
@keyframes bookShimmer{
  0%,100%{box-shadow:0 0 0 0 rgba(75,69,178,0)}
  50%{box-shadow:0 0 8px 2px rgba(75,69,178,0.18)}
}
.sublink-books:hover{background:#DDD9FB;border-color:#6C63E8;transform:translateY(-1px);box-shadow:0 4px 14px rgba(75,69,178,0.2);animation:none}
.sublink-books .sublink-icon{animation:bookBounce 2s ease-in-out infinite}
@keyframes bookBounce{
  0%,100%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(-8deg) scale(1.1)}
  75%{transform:rotate(8deg) scale(1.1)}
}
.sublink-books:hover .sublink-icon{animation:none;transform:scale(1.25)}

/* Soon */
.sublink-soon{background:var(--surface);color:var(--muted);border-color:var(--border);cursor:default;opacity:0.65}

/* STEPS */
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;position:relative}
.steps-grid::before{content:'';position:absolute;top:28px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,var(--teal-pale),var(--teal-mid),var(--teal-pale));z-index:0}
.step-card{text-align:center;padding:0 1.5rem;position:relative;z-index:1}
.step-num{width:56px;height:56px;border-radius:50%;background:var(--teal);color:white;font-family:'DM Serif Display',serif;font-size:1.5rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 0 0 8px var(--teal-pale)}
.step-card h4{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink);margin-bottom:0.5rem}
.step-card p{font-size:0.85rem;color:var(--muted);line-height:1.65}

/* MENTORSHIP */
.mentorship-wrap{display:grid;grid-template-columns:360px 1fr;gap:2.5rem;align-items:start}
.mentor-profile{background:var(--white);border-radius:var(--radius-xl);padding:2rem;border:1px solid var(--border);box-shadow:var(--shadow-sm);position:sticky;top:84px}
.mentor-avatar{width:76px;height:76px;border-radius:50%;background:var(--teal-pale);border:3px solid var(--teal-mid);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:2rem;color:var(--teal);margin-bottom:1rem}
.mentor-name{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--ink);margin-bottom:3px}
.mentor-role{font-size:0.82rem;color:var(--teal);font-weight:600;margin-bottom:0.85rem}
.mentor-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
.mentor-bio{font-size:0.875rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
.session-list{display:flex;flex-direction:column;gap:0.6rem}
.session-item{display:flex;align-items:flex-start;gap:10px;padding:0.85rem 1rem;background:var(--teal-pale);border-radius:var(--radius-sm);border:1px solid rgba(15,110,86,0.1)}
.session-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.session-item strong{display:block;font-size:0.85rem;color:var(--ink);font-weight:600;margin-bottom:1px}
.session-item span{font-size:0.75rem;color:var(--muted)}
.form-embed-wrap{background:var(--white);border-radius:var(--radius-xl);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden}
.form-embed-header{padding:1.75rem 2rem 1.25rem;border-bottom:1px solid var(--border)}
.form-embed-header h3{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--ink);margin-bottom:0.3rem}
.form-embed-header p{font-size:0.875rem;color:var(--muted)}
.form-embed-wrap iframe{width:100%;min-height:700px;border:none;display:block}

/* REAGENT */
.reagent-wrap{background:linear-gradient(140deg,#0F6E56 0%,#04342C 100%);border-radius:var(--radius-xl);padding:4.5rem 3.5rem;display:grid;grid-template-columns:1fr auto;gap:4rem;align-items:center;position:relative;overflow:hidden}
.reagent-wrap::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.04)}
.reagent-wrap::after{content:'';position:absolute;bottom:-80px;left:25%;width:360px;height:360px;border-radius:50%;background:rgba(255,255,255,0.03)}
.reagent-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22);border-radius:999px;padding:5px 15px;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.88);margin-bottom:1.25rem}
.reagent-wrap h2{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,3.5vw,2.6rem);color:white;margin-bottom:1rem;line-height:1.2;position:relative;z-index:1}
.reagent-wrap p{color:rgba(255,255,255,0.72);font-size:1rem;line-height:1.75;max-width:520px;position:relative;z-index:1}
.reagent-tiers{display:flex;gap:0.75rem;margin-top:2rem;flex-wrap:wrap;position:relative;z-index:1}
.tier-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.24);border-radius:var(--radius-sm);color:white;padding:10px 18px;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;text-align:left}
.tier-btn .tier-amount{font-weight:700;font-size:1rem;margin-top:2px}
.tier-btn:hover,.tier-btn.active{background:rgba(255,255,255,0.95);color:var(--teal);border-color:white}
.flask-big{font-size:100px;text-align:center;animation:floatBig 3.5s ease-in-out infinite;position:relative;z-index:1;user-select:none}
@keyframes floatBig{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}
.payment-opts{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:1.5rem;position:relative;z-index:1}
.pay-btn{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);border-radius:var(--radius-sm);padding:12px 16px;color:white;font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.2s}
.pay-btn:hover{background:rgba(255,255,255,0.2)}
.pay-icon{font-size:20px}

/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,0.55);padding:4rem 2.5rem 2.5rem}
.footer-inner{max-width:1120px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.footer-logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--teal-mid);display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.footer-desc{font-size:0.875rem;line-height:1.7;color:rgba(255,255,255,0.5);max-width:260px}
.footer-col h5{font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:1rem}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:0.6rem}
.footer-col a{text-decoration:none;font-size:0.875rem;color:rgba(255,255,255,0.5);transition:color 0.2s}
.footer-col a:hover{color:var(--teal-mid)}

<script>
  document.getElementById('navToggle').addEventListener('click',function(){
    const l=document.getElementById('navLinks');l.classList.toggle('open');
    this.textContent=l.classList.contains('open')?'✕':'☰';
  });
  function showSem(n,card){
    const isActive = card.classList.contains('active');
    document.querySelectorAll('.sem-card').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.sem-panel').forEach(p=>p.classList.remove('visible'));
    if(!isActive){
      card.classList.add('active');
      const panel=document.getElementById('panel-'+n);
      if(panel){
        panel.classList.add('visible');
        setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
      }
    }
  }
  function toggleSubject(header){
    const links=header.nextElementSibling;
    const isOpen=header.classList.contains('open');
    header.classList.toggle('open',!isOpen);
    links.classList.toggle('open',!isOpen);
  }
  function setTier(btn){document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  function toast(msg){const t=document.getElementById('toast');t.textContent='✅ '+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener('click',function(e){
      const target=document.querySelector(this.getAttribute('href'));
      if(target){e.preventDefault();window.scrollTo({top:target.offsetTop-80,behavior:'smooth'});document.getElementById('navLinks').classList.remove('open');document.getElementById('navToggle').textContent='☰';}
    });
  });
</script>
