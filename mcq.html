:"Type III Hypersensitivity","question":"In Type III hypersensitivity, tissue damage is primarily caused by:","options":["Direct killing by CD8+ T cells","Deposition of antigen-antibody complexes and complement activation","IgE-mediated histamine release","Macrophage granuloma formation"],"answer":1,"explanation":"Type III hypersensitivity is caused by circulating immune complexes that deposit in tissues (often vessel walls) and activate complement, causing inflammation."},{"id":18,"topic":"Type III Hypersensitivity","question":"Serum sickness is the prototype of which condition?","options":["Localized Type I hypersensitivity","Systemic Type III hypersensitivity","Cell-mediated Type IV hypersensitivity","Type II receptor dysfunction"],"answer":1,"explanation":"Serum sickness is the prototype of a systemic immune complex disease, historically seen after administration of foreign horse serum."},{"id":19,"topic":"Type III Hypersensitivity","question":"The principal morphologic manifestation of Type III hypersensitivity in blood vessels is:","options":["Caseous necrosis","Liquefactive necrosis","Fibrinoid necrosis","Fat necrosis"],"answer":2,"explanation":"The hallmark of Type III injury in blood vessels is acute vasculitis with fibrinoid necrosis of the vessel wall."},{"id":20,"topic":"Type IV Hypersensitivity","question":"Delayed-type hypersensitivity (DTH) is a form of:","options":["Type I hypersensitivity","Type II hypersensitivity","Type III hypersensitivity","Type IV hypersensitivity"],"answer":3,"explanation":"Delayed-type hypersensitivity (DTH) is the classic pattern of Type IV cell-mediated immune injury, driven by T cells."},{"id":21,"topic":"Type IV Hypersensitivity","question":"The classic example of a DTH reaction used for clinical screening is:","options":["The Monospot test","The Tuberculin (PPD) skin test","ABO blood typing","ELISA for ANA"],"answer":1,"explanation":"The PPD (tuberculin) test is the clinical application of DTH, where a visible induration appears 24 to 72 hours after intradermal injection."},{"id":22,"topic":"Type IV Hypersensitivity","question":"Which T-cell subset is responsible for recruiting neutrophils and monocytes in Type IV reactions?","options":["Th1","Th2","Th17","Treg"],"answer":2,"explanation":"Th17 cells secrete IL-17, which is responsible for recruiting neutrophils and monocytes to the site of inflammation."},{"id":23,"topic":"Type IV Hypersensitivity","question":"Granulomatous inflammation is typically associated with which type of immune response?","options":["Acute Type I allergy","Persistent Type IV hypersensitivity","Acute Type III vasculitis","Type II antibody-mediated lysis"],"answer":1,"explanation":"Granulomatous inflammation is a pattern of chronic inflammation occurring when the immune system attempts to wall off an agent that is difficult to eradicate \u2014 a persistent Type IV response."},{"id":24,"topic":"Type IV Hypersensitivity","question":"Which enzyme in CTLs enters target cells to activate caspases and induce apoptosis?","options":["Myeloperoxidase","Perforin","Granzymes","NADPH oxidase"],"answer":2,"explanation":"CTLs secrete granzymes that enter target cells through perforin channels to activate caspases and induce apoptosis."},{"id":25,"topic":"Type IV Hypersensitivity","question":"Contact dermatitis, such as the rash from poison ivy, is a clinical manifestation of:","options":["Type I hypersensitivity","Type II hypersensitivity","Type III hypersensitivity","Type IV hypersensitivity"],"answer":3,"explanation":"Contact dermatitis (e.g., poison ivy rash) is caused by T cell-mediated DTH reactions against modified self-proteins \u2014 a Type IV reaction."},{"id":26,"topic":"Innate Immunity","question":"Which transcription factor is essential for the production of Type I interferons in response to viral DNA?","options":["NF-\u03baB","IRF (Interferon Regulatory Factor)","STAT1","MYC"],"answer":1,"explanation":"Interferon Regulatory Factors (IRFs) are transcription factors that stimulate the production of antiviral type I interferons in response to viral nucleic acids."},{"id":27,"topic":"Innate Immunity","question":"Natural Killer (NK) cells are prevented from attacking healthy cells because they recognize:","options":["Foreign peptides","Self MHC Class I molecules","Sialic acid residues","Fc portions of IgG"],"answer":1,"explanation":"NK cells have inhibitory receptors that recognize self MHC Class I molecules on healthy cells, preventing the NK cell from attacking them."},{"id":28,"topic":"Transplant Rejection","question":"In the 'direct pathway' of graft rejection, host T cells recognize:","options":["Processed graft antigens on host APCs","Intact HLA molecules on graft APCs","Graft antibodies","Donor complement proteins"],"answer":1,"explanation":"In the direct pathway of rejection, host T cells directly recognize foreign (allogeneic) HLA molecules expressed on the APCs within the graft."},{"id":29,"topic":"Adaptive Immunity","question":"MHC Class II molecules display peptides derived from:","options":["Cytoplasmic viral proteins","Endogenously synthesized tumor antigens","Extracellular proteins internalized into endosomes","Nuclear histones"],"answer":2,"explanation":"MHC Class II molecules present antigens derived from microbes that were internalized and proteolytically digested in endosomal vesicles."},{"id":30,"topic":"Adaptive Immunity","question":"Which molecule provides the 'Signal 2' necessary for T-cell activation by binding to CD28?","options":["ICAM-1","B7 (CD80/86)","CD40","LFA-1"],"answer":1,"explanation":"B7 molecules (CD80/86) on APCs bind to CD28 on T cells to provide Signal 2 (costimulation), which is essential for full T-cell activation."},{"id":31,"topic":"Type II Hypersensitivity","question":"A woman with hyperthyroidism is found to have antibodies that stimulate her TSH receptors. This is an example of Type II hypersensitivity involving:","options":["Opsonization","Inflammation","Cellular dysfunction","Direct cell lysis"],"answer":2,"explanation":"Graves disease is a Type II reaction where antibodies stimulate the TSH receptor, causing hyperthyroidism without destroying the tissue \u2014 cellular dysfunction."},{"id":32,"topic":"Type III Hypersensitivity","question":"The 'Arthus reaction' is characterized by:","options":["Systemic anaphylaxis","Localized Type III immune complex vasculitis","Chronic T-cell mediated granulomas","IgE-mediated hives"],"answer":1,"explanation":"The Arthus reaction is an experimental localized area of tissue necrosis resulting from acute immune complex vasculitis in the skin \u2014 a localized Type III reaction."},{"id":33,"topic":"Type I Hypersensitivity","question":"Which cytokine stimulates B cells to undergo heavy-chain class switching to IgE?","options":["IL-2","IL-4","IL-12","TNF"],"answer":1,"explanation":"IL-4, secreted by Th2 cells, acts on B cells to stimulate the heavy-chain class switch to IgE production."},{"id":34,"topic":"Type IV Hypersensitivity","question":"'Epithelioid cells' in a granuloma are derived from which cell type?","options":["B lymphocytes","Squamous epithelial cells","Activated macrophages","Neutrophils"],"answer":2,"explanation":"Epithelioid cells are activated macrophages found in granulomas that have pink granular cytoplasm and indistinct boundaries, resembling epithelial cells."},{"id":35,"topic":"Adaptive Immunity","question":"The hygiene hypothesis suggests that:","options":["Excessive cleanliness prevents all autoimmune diseases","Early childhood exposure to microbes educates the immune system to prevent allergies","Handwashing is the only way to prevent Type I reactions","Vaccines cause hypersensitivity by mimicking allergens"],"answer":1,"explanation":"The hygiene hypothesis suggests that diminished environmental exposure to microbes in urbanized societies leads to an increase in allergic and autoimmune diseases."},{"id":36,"topic":"Innate Immunity","question":"Which component of the inflammasome complex is responsible for the proteolytic cleavage of pro-IL-1\u03b2?","options":["NLRP3","Adapter protein","Caspase-1","TLR4"],"answer":2,"explanation":"The inflammasome activates caspase-1, which then cleaves the precursor pro-IL-1\u03b2 into its active, secreted pro-inflammatory form."},{"id":37,"topic":"Type II Hypersensitivity","question":"A patient receives a mismatched blood transfusion and suffers from rapid hemolysis. The mechanism of injury is:","options":["Type III complex deposition in the spleen","Type II antibody-mediated opsonization and phagocytosis","Type IV CTL-mediated destruction","Type I mast cell systemic release"],"answer":1,"explanation":"Hemolytic transfusion reactions occur when host antibodies react with and opsonize mismatched donor red cells \u2014 a Type II mechanism."},{"id":38,"topic":"Type II Hypersensitivity","question":"In Myasthenia Gravis, muscle weakness occurs because antibodies:","options":["Destroy the muscle cells via complement","Block acetylcholine receptors at the motor end plate","Stimulate excessive nerve impulses","Cause fibrinoid necrosis of the neuromuscular junction"],"answer":1,"explanation":"In Myasthenia Gravis, antibodies to acetylcholine receptors block neuromuscular transmission, leading to progressive muscle weakness."},{"id":39,"topic":"Type III Hypersensitivity","question":"The primary reason that Type III hypersensitivity often affects the kidneys and joints is that:","options":["These organs produce more antigens","These are sites where blood is filtered at high pressure","T cells are more active in these locations","Mast cells are concentrated in the glomeruli"],"answer":1,"explanation":"High-pressure filtration in the kidneys and joints causes immune complexes to concentrate and deposit in the glomeruli and synovial fluid."},{"id":40,"topic":"Adaptive Immunity","question":"Which mediator is the 'executioner' of the intrinsic pathway of apoptosis when released from mitochondria?","options":["Caspase-8","Cytochrome c","Perforin","Histamine"],"answer":1,"explanation":"The release of cytochrome c from the mitochondrial intermembrane space into the cytosol initiates the execution phase of the intrinsic apoptotic pathway."},{"id":41,"topic":"Innate Immunity","question":"The STING pathway is a cytosolic mechanism that senses:","options":["Viral RNA","Urate crystals","Microbial DNA","Misfolded proteins"],"answer":2,"explanation":"The STING (Stimulator of Interferon Genes) pathway is a cytosolic mechanism designed to sense microbial DNA and stimulate the production of interferon-\u03b1."},{"id":42,"topic":"Adaptive Immunity","question":"RAG-1 and RAG-2 enzymes are critical during lymphocyte maturation for:","options":["Inducing apoptosis of self-reactive clones","Mediating somatic recombination of antigen receptor genes","Stimulating isotype switching to IgG","Activating the NADPH oxidase system"],"answer":1,"explanation":"RAG-1 and RAG-2 are enzymes that mediate V(D)J recombination of gene segments to create diverse antigen receptors during T and B cell maturation."},{"id":43,"topic":"Adaptive Immunity","question":"Antibody-Dependent Cellular Cytotoxicity (ADCC) is a process where:","options":["B cells directly kill virus-infected cells","NK cells lyse IgG-coated target cells without phagocytosis","Complement drills holes in bacterial walls","Macrophages produce granulomas"],"answer":1,"explanation":"ADCC involves NK cells (and other effector cells) killing IgG-coated targets via their Fc receptors, without needing to phagocytose the target."},{"id":44,"topic":"Autoimmunity","question":"Which specific HLA allele has the strongest association with Ankylosing Spondylitis (Odds ratio >100)?","options":["HLA-DR3","HLA-DQ8","HLA-B27","HLA-DR4"],"answer":2,"explanation":"HLA-B27 has an exceptionally strong association with ankylosing spondylitis, carrying a relative risk/odds ratio of 100 to 200."},{"id":45,"topic":"Autoimmunity","question":"'Molecular mimicry' contributes to autoimmunity when:","options":["A virus kills a T cell","Microbial antigens share amino acid sequences with self-antigens","A drug binds to a red cell membrane","A person has a mutation in the AIRE gene"],"answer":1,"explanation":"Molecular mimicry occurs when an immune response against a microbe cross-reacts with self-tissues due to shared amino acid sequences (e.g., rheumatic heart disease)."},{"id":46,"topic":"Type III Hypersensitivity","question":"A 30-year-old male develops joint pain and a skin rash 10 days after receiving horse-derived antivenom. Laboratory tests show low serum C3 levels. The most likely diagnosis is:","options":["Systemic anaphylaxis","Serum sickness","Goodpasture syndrome","Tuberculoid leprosy"],"answer":1,"explanation":"Serum sickness is a systemic Type III reaction occurring 1\u20132 weeks after foreign protein exposure, characterized by immune complex deposition and complement consumption (low C3)."},{"id":47,"topic":"Autoimmunity","question":"The AIRE (Autoimmune Regulator) protein is essential for central tolerance because it:","options":["Edits B cell receptors in the bone marrow","Stimulates expression of peripheral tissue-restricted self-antigens in the thymus","Suppresses T cells in the lymph nodes","Induces anergy in the skin"],"answer":1,"explanation":"AIRE is critical for negative selection; it ensures immature T cells specific for peripheral self-antigens are deleted in the thymus, preventing autoimmunity."},{"id":48,"topic":"Adaptive Immunity","question":"Which molecule serves as a 'coinhibitor' to terminate T-cell responses and is a target for cancer immunotherapy?","options":["CD28","CTLA-4","CD40L","B7-1"],"answer":1,"explanation":"CTLA-4 is an inhibitory receptor that brakes the immune response. Blocking it (checkpoint blockade) is a major strategy in cancer immunotherapy."},{"id":49,"topic":"Transplant Rejection","question":"In chronic transplant rejection, the primary morphologic change in the graft is:","options":["Acute fibrinoid necrosis of arterioles","Interstitial fibrosis and graft arteriosclerosis","Thrombosis of the main renal artery","Extensive neutrophilic infiltration"],"answer":1,"explanation":"Chronic rejection is an indolent process resulting in vascular narrowing (arteriosclerosis) and interstitial fibrosis, likely mediated by T-cell cytokines and antibodies."},{"id":50,"topic":"Adaptive Immunity","question":"Which of the following describes the mechanism of action of 'superantigens' found in Toxic Shock Syndrome?","options":["They inhibit protein synthesis like diphtheria toxin","They bind to conserved portions of the TCR and MHC II, causing massive cytokine release","They produce pores in the red cell membrane","They block the release of inhibitory neurotransmitters"],"answer":1,"explanation":"Superantigens cause non-specific, massive T-cell activation by binding conserved portions of the TCR and MHC II, triggering a cytokine storm similar to septic shock."}]},{"chapter":5,"title":"Neoplasia","topics":["Nomenclature","Differentiation and Anaplasia","Metastasis","Clinical Aspects","Tumor Markers","Staging and Grading","Paraneoplastic Syndromes","Cancer Cachexia"],"questions":[{"id":1,"topic":"Nomenclature","question":"A benign tumor arising from fibrous tissue is termed a:","options":["Fibrosarcoma","Fibroma","Adenoma","Papilloma"],"answer":1,"explanation":"Benign tumors of mesenchymal origin generally attach the suffix '-oma' to the cell type of origin. A benign fibrous tissue tumor is a fibroma."},{"id":2,"topic":"Nomenclature","question":"Which of the following terms describes a malignant tumor of mesenchymal origin?","options":["Carcinoma","Sarcoma","Adenoma","Lymphoma"],"answer":1,"explanation":"Malignant tumors that arise in solid mesenchymal tissues (bone, muscle, fat) are designated as sarcomas."},{"id":3,"topic":"Nomenclature","question":"A malignant epithelial tumor that grows in a glandular pattern is called a(n):","options":["Squamous cell carcinoma","Sarcoma","Adenocarcinoma","Mesothelioma"],"answer":2,"explanation":"Malignant epithelial neoplasms that grow in a glandular pattern are termed adenocarcinomas."},{"id":4,"topic":"Nomenclature","question":"A mass composed of disorganized but mature cells indigenous to the particular site is called a:","options":["Choristoma","Hamartoma","Teratoma","Nevus"],"answer":1,"explanation":"Hamartomas are disorganized but mature masses composed of cells indigenous to the involved site \u2014 essentially disordered normal tissue."},{"id":5,"topic":"Nomenclature","question":"Which of the following contains recognizable mature or immature cells or tissues belonging to more than one germ cell layer?","options":["Mixed tumor","Pleomorphic adenoma","Teratoma","Cystadenoma"],"answer":2,"explanation":"A teratoma contains recognizable mature or immature cells or tissues belonging to more than one germ cell layer, arising from totipotential germ cells."},{"id":6,"topic":"Differentiation and Anaplasia","question":"The extent to which neoplastic parenchymal cells resemble their normal counterparts is known as:","options":["Anaplasia","Pleomorphism","Differentiation","Metastasis"],"answer":2,"explanation":"Differentiation refers to the extent to which neoplastic parenchymal cells resemble their normal counterparts morphologically and functionally."},{"id":7,"topic":"Differentiation and Anaplasia","question":"Lack of differentiation in a tumor is referred to as:","options":["Dysplasia","Metaplasia","Anaplasia","Hyperplasia"],"answer":2,"explanation":"Anaplasia is defined as a lack of differentiation \u2014 the cells have no resemblance to their tissue of origin."},{"id":8,"topic":"Differentiation and Anaplasia","question":"Variation in the size and shape of cells and nuclei within a tumor is called:","options":["Hyperchromasia","Pleomorphism","Desmoplasia","Mitotic rate"],"answer":1,"explanation":"Variation in the size and shape of cells and their nuclei is known as pleomorphism, a hallmark of malignancy."},{"id":9,"topic":"Metastasis","question":"Which of the following is the most reliable feature that differentiates a malignant tumor from a benign one?","options":["Rate of growth","Size of the tumor","Presence of metastasis","Presence of a capsule"],"answer":2,"explanation":"Metastasis is the most reliable feature that unequivocally marks a tumor as malignant \u2014 benign tumors do not metastasize."},{"id":10,"topic":"Differentiation and Anaplasia","question":"A 'scirrhous' tumor is one that is characterized by:","options":["Extensive necrosis","Abundant collagenous stroma (desmoplasia)","Rapid metastasis","High mitotic index"],"answer":1,"explanation":"Neoplastic cells can stimulate the formation of abundant collagenous stroma, a feature referred to as desmoplasia, giving the tumor a hard 'scirrhous' consistency."},{"id":11,"topic":"Differentiation and Anaplasia","question":"Disordered growth encountered principally in epithelial cells, often characterized by a loss of architectural organization, is called:","options":["Metaplasia","Dysplasia","Anaplasia","Neoplasia"],"answer":1,"explanation":"Dysplasia is defined as disordered growth, principally encountered in epithelial cells and characterized by loss of normal architectural organization."},{"id":12,"topic":"Differentiation and Anaplasia","question":"When dysplastic changes involve the full thickness of the epithelium but do not penetrate the basement membrane, the lesion is called:","options":["Invasive carcinoma","Carcinoma in situ","Squamous metaplasia","Benign polyp"],"answer":1,"explanation":"When dysplasia involves the full thickness of the epithelium but does not penetrate the basement membrane, it is called carcinoma in situ \u2014 a preinvasive lesion."},{"id":13,"topic":"Metastasis","question":"Which of the following is the most common pathway for the initial dissemination of carcinomas?","options":["Hematogenous spread","Seeding of body cavities","Lymphatic spread","Iatrogenic spread"],"answer":2,"explanation":"Transport through lymphatic vessels is the most common pathway for the initial dissemination of carcinomas."},{"id":14,"topic":"Metastasis","question":"Hematogenous spread is the most characteristic dissemination pathway for:","options":["Adenocarcinomas","Squamous cell carcinomas","Sarcomas","Papillomas"],"answer":2,"explanation":"While also seen in carcinomas, hematogenous spread is the most characteristic dissemination pathway for sarcomas."},{"id":15,"topic":"Metastasis","question":"The first lymph node in a regional lymphatic basin that receives lymph flow from a primary tumor is the:","options":["Distal node","Sentinel node","Axillary node","Primary node"],"answer":1,"explanation":"A sentinel lymph node is the first node in a regional basin that receives lymph flow from the primary tumor \u2014 its status predicts regional spread."},{"id":16,"topic":"Metastasis","question":"Which organs are most frequently involved in hematogenous metastasis because they receive the bulk of systemic/portal venous drainage?","options":["Brain and Bone","Liver and Lungs","Kidney and Spleen","Adrenals and Heart"],"answer":1,"explanation":"Liver and lungs are most frequently involved in hematogenous metastasis because they receive the bulk of systemic (caval) and portal venous drainage respectively."},{"id":17,"topic":"Cancer Cachexia","question":"Progressive loss of body fat and lean body mass, accompanied by profound weakness and anemia in a cancer patient, is known as:","options":["Anorexia","Paraneoplastic syndrome","Cachexia","Marasmus"],"answer":2,"explanation":"Cancer cachexia is a hypercatabolic state defined by progressive loss of body fat and lean muscle mass, profound weakness, and anemia."},{"id":18,"topic":"Cancer Cachexia","question":"Which cytokine is considered a major mediator of cancer cachexia?","options":["IL-10","TGF-\u03b2","TNF","VEGF"],"answer":2,"explanation":"Inflammatory mediators, particularly TNF (tumor necrosis factor), IL-1, and IL-6, are major mediators of cancer cachexia by inducing a hypercatabolic state."},{"id":19,"topic":"Paraneoplastic Syndromes","question":"Paraneoplastic syndromes are defined as symptom complexes that:","options":["Result from the local mass effect of the tumor","Occur in 100% of cancer patients","Cannot be explained by the local or distant spread of the tumor","Result only from tumors of endocrine origin"],"answer":2,"explanation":"Paraneoplastic syndromes are symptom complexes that cannot be explained by the anatomic distribution of the tumor or indigenous hormones."},{"id":20,"topic":"Paraneoplastic Syndromes","question":"The most common paraneoplastic syndrome is:","options":["Cushing syndrome","Hypercalcemia","Trousseau syndrome","Acanthosis nigricans"],"answer":1,"explanation":"Hypercalcemia is considered the most common paraneoplastic syndrome, most often caused by tumor secretion of PTHrP."},{"id":21,"topic":"Paraneoplastic Syndromes","question":"Hypercalcemia in malignancy is most commonly caused by the production of:","options":["Calcitonin","Vitamin D","Parathyroid hormone-related protein (PTHRP)","Erythropoietin"],"answer":2,"explanation":"The humoral factor most commonly associated with paraneoplastic hypercalcemia is PTHrP (parathyroid hormone-related protein)."},{"id":22,"topic":"Staging and Grading","question":"The 'T' in the TNM staging system represents:","options":["Time since diagnosis","Type of cell origin","Size of the primary tumor","Tendency to metastasize"],"answer":2,"explanation":"In the TNM staging system, 'T' stands for the size and local extent of the primary tumor."},{"id":23,"topic":"Tumor Markers","question":"Which diagnostic method is used to determine the 'clonality' of a lymphoid proliferation?","options":["H&E histology","PCR-based antigen receptor gene rearrangement","Fine-needle aspiration","Serum tumor markers"],"answer":1,"explanation":"PCR-based evaluation of rearranged T-cell receptor or immunoglobulin genes allows distinction between monoclonal (neoplastic) and polyclonal (reactive) proliferations."},{"id":24,"topic":"Tumor Markers","question":"Carcinoembryonic antigen (CEA) is most useful for:","options":["Screening the general population for colon cancer","Monitoring for tumor recurrence after treatment","Diagnosing benign polyps","Determining the grade of a tumor"],"answer":1,"explanation":"While not specific for screening, tumor markers like CEA are useful in monitoring a patient's response to therapy and detecting recurrence after treatment."},{"id":25,"topic":"Tumor Markers","question":"Which marker is frequently used to support the diagnosis of prostatic adenocarcinoma?","options":["AFP","PSA","HCG","CA-125"],"answer":1,"explanation":"Blood tests for prostate-specific antigen (PSA) are used to suspect, diagnose, and monitor prostatic adenocarcinoma."},{"id":26,"topic":"Staging and Grading","question":"In the TNM system, an 'N0' designation indicates:","options":["No distant metastasis","The tumor is in situ","No regional lymph node involvement","The tumor cannot be assessed"],"answer":2,"explanation":"In the TNM system, 'N0' indicates that no regional lymph node involvement is detected."},{"id":27,"topic":"Staging and Grading","question":"'Grading' of a tumor is primarily based on which of the following?","options":["Size and local extent of the tumor","Degree of differentiation and number of mitoses","Presence of lymph node involvement","Presence of distant metastasis"],"answer":1,"explanation":"Grading is an assessment of the degree of differentiation and the number of mitoses within a tumor \u2014 it reflects biological aggressiveness."},{"id":28,"topic":"Nomenclature","question":"Which of the following statements regarding tumor capsules is true?","options":["Most malignant tumors have well-developed capsules","The capsule is formed by the host's inflammatory response","Benign tumors are typically encapsulated, making them easily excisable","The presence of a capsule guarantees that a tumor will not recur"],"answer":2,"explanation":"Encapsulation is characteristic of benign tumors, creating a tissue plane that makes them discrete and easily excisable surgically."},{"id":29,"topic":"Metastasis","question":"Venous invasion by tumor cells typically results in spread to which of the following organs first?","options":["Spleen","Kidney","Lungs","Heart"],"answer":2,"explanation":"In venous invasion, tumor cells follow venous flow and often come to rest in the first capillary bed they encounter, which is frequently the lungs."},{"id":30,"topic":"Metastasis","question":"A 'skip metastasis' refers to:","options":["Hematogenous spread bypassing the liver","Dissemination through the CNS only","Bypassing of local lymph nodes during lymphatic spread","Direct seeding of the peritoneum"],"answer":2,"explanation":"A skip metastasis occurs when local lymph nodes are bypassed due to variations in the normal patterns of lymphatic drainage."},{"id":31,"topic":"Paraneoplastic Syndromes","question":"Which paraneoplastic syndrome is most likely to be associated with a small-cell carcinoma of the lung?","options":["Hypercalcemia","Cushing syndrome","Polycythemia","Osteomalacia"],"answer":1,"explanation":"Cushing syndrome, caused by ectopic ACTH production, is a common paraneoplastic syndrome in small-cell carcinoma of the lung."},{"id":32,"topic":"Paraneoplastic Syndromes","question":"Migratory thrombophlebitis associated with deep-seated visceral cancers is known as:","options":["Libman-Sacks endocarditis","Trousseau syndrome","Horner syndrome","Li-Fraumeni syndrome"],"answer":1,"explanation":"Migratory thrombophlebitis associated with deep-seated visceral cancers (especially pancreatic) is known as Trousseau syndrome."},{"id":33,"topic":"Tumor Markers","question":"Which immunohistochemical marker is used to categorize an undifferentiated tumor as a 'carcinoma'?","options":["Desmin","Vimentin","Cytokeratin","CD20"],"answer":2,"explanation":"The presence of cytokeratins detected by immunohistochemistry points toward an epithelial origin, identifying a tumor as a carcinoma."},{"id":34,"topic":"Clinical Aspects","question":"What is the primary utility of 'frozen sections' during surgery?","options":["To determine the definitive grade of a tumor","To evaluate the margins of an excised cancer immediately","To perform detailed molecular profiling","To replace the need for formal paraffin-embedded histology"],"answer":1,"explanation":"Quick-frozen sections permit immediate histologic evaluation to ensure surgical margins are free of cancer intraoperatively."},{"id":35,"topic":"Clinical Aspects","question":"The presence of 'apple-green birefringence' under polarized light after Congo red staining is diagnostic of:","options":["Fibrinoid necrosis","Amyloidosis","Collagenous stroma","Hyaline change"],"answer":1,"explanation":"Apple-green birefringence under polarized light after Congo red staining is the diagnostic hallmark of amyloidosis."},{"id":36,"topic":"Clinical Aspects","question":"Which of the following is considered an 'acquired predisposing condition' for cancer?","options":["A history of exercise","Chronic inflammatory bowel disease","Normal aging under 30","Type 1 hypersensitivity"],"answer":1,"explanation":"The risk of colorectal carcinoma is significantly increased in individuals with chronic inflammatory bowel disease \u2014 an acquired predisposing condition."},{"id":37,"topic":"Differentiation and Anaplasia","question":"Pseudoepitheliomatous hyperplasia is a morphologic change that can mimic:","options":["A benign polyp","Carcinoma","Sarcoma","Teratoma"],"answer":1,"explanation":"Pseudoepitheliomatous hyperplasia at the borders of a chronic ulcer can morphologically mimic a carcinoma and must be distinguished histologically."},{"id":38,"topic":"Clinical Aspects","question":"The 'Warburg Effect' refers to the cancer cell's preference for:","options":["Oxidative phosphorylation over glycolysis","Aerobic glycolysis (fermentation) even in the presence of oxygen","Anaerobic metabolism only","Protein catabolism over lipid synthesis"],"answer":1,"explanation":"The Warburg effect refers to the metabolic switch of cancer cells to aerobic glycolysis even when ample oxygen is available, supporting rapid biosynthesis."},{"id":39,"topic":"Differentiation and Anaplasia","question":"Which feature of the cell nucleus is characteristic of anaplasia?","options":["Small, uniform size","Low nuclear-to-cytoplasmic ratio","Coarsely clumped chromatin and large nucleoli","Regular, smooth nuclear membrane"],"answer":2,"explanation":"Cancer cells characteristically have irregular nuclei with coarsely clumped chromatin, abnormally large nucleoli, and a high nuclear-to-cytoplasmic ratio."},{"id":40,"topic":"Clinical Aspects","question":"Tumor 'progression' refers to the tendency of tumors to:","options":["Regress spontaneously without treatment","Become more aggressive and genetically heterogeneous over time","Stay genetically identical to the founding cell","Respond better to therapy as they grow larger"],"answer":1,"explanation":"Tumor progression refers to the tendency of tumors to become more aggressive and genetically heterogeneous over time through Darwinian selection of clones."},{"id":41,"topic":"Differentiation and Anaplasia","question":"A 55-year-old man presents with a lung mass. Biopsy shows cells with very little cytoplasm and large, dark nuclei with no gland formation or keratinization. This tumor is best described as:","options":["Well-differentiated","Moderately differentiated","Poorly differentiated (anaplastic)","Benign adenoma"],"answer":2,"explanation":"Highly anaplastic tumors exhibit little or no evidence of differentiation \u2014 large dark nuclei, scant cytoplasm, and no recognizable tissue patterns."},{"id":42,"topic":"Differentiation and Anaplasia","question":"A 65-year-old woman has a 'stony hard' breast mass. Histology shows small nests of malignant cells surrounded by dense fibrous connective tissue. The density is primarily due to:","options":["Rapid cell division","Desmoplasia","Tumor necrosis","Intracellular accumulation of lipids"],"answer":1,"explanation":"The stony-hard consistency of many breast cancers is due to the induction of abundant fibrous stroma (desmoplasia) by the tumor cells."},{"id":43,"topic":"Nomenclature","question":"A 42-year-old patient has an ovarian mass containing hair, sebaceous material, and a well-formed tooth. This tumor is a:","options":["Pleomorphic adenoma","Hamartoma","Mature teratoma","Choristoma"],"answer":2,"explanation":"A cystic tumor containing derivatives of multiple germ layers (hair, sebum, teeth) is a mature (dermoid) teratoma arising from totipotential germ cells."},{"id":44,"topic":"Cancer Cachexia","question":"A 70-year-old man with advanced pancreatic cancer has lost 20 kg in 3 months and appears emaciated. The mechanism most likely responsible is:","options":["Simple starvation due to loss of appetite","Release of TNF and IL-6 inducing a hypercatabolic state","The tumor cells consuming all available glucose","Intestinal obstruction by the tumor mass"],"answer":1,"explanation":"Proinflammatory cytokines like TNF and IL-6 released in cancer are primarily responsible for the hypercatabolic state of cachexia causing muscle and fat wasting."},{"id":45,"topic":"Paraneoplastic Syndromes","question":"A 60-year-old smoker with a lung mass develops truncal obesity, moon face, and hypertension with very high ACTH levels. The most likely explanation is:","options":["Metastasis to the pituitary gland","Ectopic production of ACTH by the lung cancer","Metastasis to the adrenal cortex","A co-existing benign pituitary adenoma"],"answer":1,"explanation":"Cushing syndrome in lung cancer patients results from the ectopic secretion of ACTH or pro-opiomelanocortin by the small-cell lung carcinoma."},{"id":46,"topic":"Metastasis","question":"A 50-year-old man has a 2-cm thyroid nodule that on FNA shows cells identical to normal thyroid follicles, but the nodule is clearly invading the surrounding capsule. This lesion is a:","options":["Benign thyroid adenoma","Well-differentiated thyroid adenocarcinoma","Thyroid hamartoma","Anaplastic thyroid carcinoma"],"answer":1,"explanation":"Malignant tumors can contain cells that appear identical to normal tissue; their malignancy is revealed by invasion of adjacent structures like the capsule."},{"id":47,"topic":"Metastasis","question":"A patient with breast cancer undergoes a procedure where blue dye is injected near the tumor to identify and biopsy the first draining lymph node. This is known as:","options":["Total axillary dissection","Sentinel lymph node biopsy","Radical mastectomy","Skip metastasis mapping"],"answer":1,"explanation":"Injecting tracers to identify and biopsy the first node in a draining basin is called sentinel lymph node biopsy \u2014 avoids full axillary dissection."},{"id":48,"topic":"Nomenclature","question":"A 30-year-old man has a rapidly enlarging thigh mass. Histology shows highly pleomorphic spindle cells and frequent bizarre mitoses with no epithelial differentiation. This tumor is likely a:","options":["Carcinoma","Sarcoma","Adenoma","Papilloma"],"answer":1,"explanation":"Highly pleomorphic spindle cell tumors of mesenchymal origin (such as in the thigh soft tissue) are classified as sarcomas."},{"id":49,"topic":"Staging and Grading","question":"A colon cancer report states: 'Tumor invades into the muscularis propria (T2), two regional lymph nodes are positive (N1), and no distant spread (M0).' This information describes the tumor's:","options":["Grade","Differentiation","Stage","Lineage"],"answer":2,"explanation":"TNM descriptions (T2, N1, M0) provide information on the size and spread of the cancer, which together define its stage \u2014 not grade."},{"id":50,"topic":"Tumor Markers","question":"A 58-year-old patient with cirrhosis has a large liver mass with an extremely high level of Alpha-fetoprotein (AFP). High AFP levels are most characteristic of:","options":["Colon cancer recurrence","Hepatocellular carcinoma","Prostate cancer","Breast cancer"],"answer":1,"explanation":"High levels of the oncofetal antigen alpha-fetoprotein (AFP) are characteristic of hepatocellular carcinoma and certain germ cell tumors."}]},{"chapter":6,"title":"Infectious Diseases \u2014 General Principles of Microbial Pathogenesis","topics":["Host Defenses","Transmission and Entry","Viral Pathogenesis","Bacterial Virulence","Immune Evasion","Tissue Responses","Parasitic Infections","Fungal Infections"],"questions":[{"id":1,"topic":"Host Defenses","question":"Which of the following describes the presence of microorganisms that coexist peacefully with their human hosts in various microenvironmental niches?","options":["Pathogenicity","Virulence","Microbiome","Sepsis"],"answer":2,"explanation":"Humans coexist with a complex ecosystem of commensal microorganisms known as the microbiome, which occupy various microenvironmental niches."},{"id":2,"topic":"Host Defenses","question":"The tough keratinized layer of the epidermis protects against infection by providing which of the following?","options":["High pH environment","Mechanical barrier and antimicrobial fatty acids","Nutrient-rich sebum for all bacteria","High temperature"],"answer":1,"explanation":"The tough keratinized epidermis provides a mechanical barrier, maintains a low pH, and produces antimicrobial fatty acids and defensins that are toxic to bacteria."},{"id":3,"topic":"Host Defenses","question":"Microorganisms in aerosol particles larger than 5 microns are primarily cleared from the respiratory tract by:","options":["Alveolar macrophages","Mucociliary blanket and ciliary action","Type II pneumocytes","Direct absorption into the blood"],"answer":1,"explanation":"Microorganisms in aerosol particles larger than 5 microns are trapped in the mucociliary blanket and moved by ciliary action to the throat to be swallowed."},{"id":4,"topic":"Transmission and Entry","question":"Which enzyme allows Schistosoma larvae to penetrate unbroken skin?","options":["Lipase","Amylase","Proteolytic enzymes that dissolve keratinocyte adhesions","Hyaluronidase only"],"answer":2,"explanation":"Schistosoma larvae can penetrate unbroken skin by releasing proteolytic enzymes that dissolve the adhesive proteins holding keratinocytes together."},{"id":5,"topic":"Transmission and Entry","question":"Most gastrointestinal pathogens are transmitted through which of the following routes?","options":["Skin-to-skin contact","Fecal-oral route via contaminated food or water","Respiratory droplets","Blood-borne spread"],"answer":1,"explanation":"Most gastrointestinal pathogens are transmitted through the fecal-oral route via contaminated food or water."},{"id":6,"topic":"Host Defenses","question":"Which gastric defense mechanism is bypassed by acid-resistant cysts and eggs of protozoa and helminths?","options":["Pancreatic enzymes","Peristalsis","Acidic gastric secretions","Bile detergents"],"answer":2,"explanation":"Cysts and eggs of many protozoa and helminths have acid-resistant outer coats that allow them to bypass the defense of acidic gastric secretions."},{"id":7,"topic":"Transmission and Entry","question":"A 22-year-old college student with meningitis caused by Neisseria meningitidis. The student's susceptibility most likely relates to:","options":["Lack of previous exposure to the specific colonizing strain","A defect in the mucociliary escalator","High gastric acidity","Excessive production of IgA"],"answer":0,"explanation":"Susceptibility to invasive disease by Neisseria meningitidis often relates to an individual's lack of previous exposure to the specific colonizing strain."},{"id":8,"topic":"Transmission and Entry","question":"Pathogens such as poliovirus and Shigella spp. gain entry to the lymphoid system by being taken up through:","options":["Goblet cells","Kupffer cells","M cells","Parietal cells"],"answer":2,"explanation":"Pathogens such as poliovirus, Shigella, and Salmonella gain entry to the lymphoid system by being taken up through M cells in the gut Peyer's patches."},{"id":9,"topic":"Transmission and Entry","question":"The successful infection of the urogenital tract by Escherichia coli requires the bacteria to:","options":["Survive an alkaline environment","Adhere to the urothelium to avoid being washed away during micturition","Enter through the renal artery","Form a hard capsule resistant to bile"],"answer":1,"explanation":"Successful urogenital infection by E. coli requires adhesion to the urothelium to avoid being washed away during urination."},{"id":10,"topic":"Transmission and Entry","question":"Vertical transmission of cytomegalovirus (CMV) to a newborn most commonly occurs through:","options":["Inhalation of nursery air","Maternal milk, birth canal contact, or placental-fetal spread","Shared clothing","Ingestion of contaminated water"],"answer":1,"explanation":"Vertical transmission of CMV most commonly occurs through placental-fetal spread, contact with the birth canal during delivery, or through maternal milk."},{"id":11,"topic":"Viral Pathogenesis","question":"Which route is used by the rabies virus and poliovirus to disseminate to the central nervous system?","options":["Bloodstream (viremia)","Lymphatic drainage","Infection of peripheral nerves and retrograde axonal transport","Direct penetration of the skull"],"answer":2,"explanation":"Rabies virus and poliovirus disseminate to the CNS by infecting peripheral nerves and using retrograde axonal transport to reach the spinal cord and brain."},{"id":12,"topic":"Immune Evasion","question":"A biopsy from an AIDS patient shows macrophages packed with acid-fast bacilli but no well-formed granulomas. This tissue response indicates:","options":["An effective Th1-mediated immune response","A severe deficiency in cell-mediated immunity","The presence of highly virulent pyogenic bacteria","A cytopathic-cytoproliferative reaction"],"answer":1,"explanation":"In AIDS patients with severe immunodeficiency, mycobacteria multiply profusely in macrophages that fail to form characteristic granulomas due to loss of cell-mediated immunity."},{"id":13,"topic":"Tissue Responses","question":"Disseminated pathogens that produce fever, low blood pressure, and coagulopathy are inducing a syndrome known as:","options":["Abscess","Sepsis","Hyperemia","Organization"],"answer":1,"explanation":"Sepsis is a systemic inflammatory response syndrome induced by disseminated pathogens, often resulting in fever, hypotension, and coagulopathy."},{"id":14,"topic":"Immune Evasion","question":"To escape host antibodies, influenza viruses undergo frequent recombination events known as:","options":["Quorum sensing","Biofilm formation","Antigenic drift and shift","Viral latency"],"answer":2,"explanation":"Recombination events and mutations in influenza viruses allow for antigenic drift (minor changes) and antigenic shift (major changes) to escape host antibodies."},{"id":15,"topic":"Bacterial Virulence","question":"Which bacterial structure is primarily responsible for preventing phagocytosis by neutrophils?","options":["Pili","Flagella","Carbohydrate capsule","Endotoxin (LPS)"],"answer":2,"explanation":"The carbohydrate capsule on many bacteria (e.g., S. pneumoniae) is primarily responsible for preventing phagocytosis by neutrophils."},{"id":16,"topic":"Immune Evasion","question":"The mechanism by which Staphylococcus aureus inhibits phagocytosis involves the expression of Protein A, which:","options":["Binds the Fc portion of antibodies","Degrades complement C3b","Neutralizes stomach acid","Forms a biofilm on catheters"],"answer":0,"explanation":"S. aureus expresses Protein A, which binds to the Fc portion of antibodies, competitively inhibiting their binding to phagocyte Fc receptors and blocking opsonization."},{"id":17,"topic":"Immune Evasion","question":"Some viruses, such as HSV and CMV, evade CD8+ CTL recognition by:","options":["Increasing MHC Class I expression","Inhibiting or altering the localization of MHC Class I proteins","Producing massive amounts of IgG","Entering the fecal-oral route"],"answer":1,"explanation":"Several DNA viruses including HSV and CMV evade CD8+ CTL recognition by inhibiting or altering the localization of MHC Class I proteins."},{"id":18,"topic":"Immune Evasion","question":"What term describes the loss of T-cell potency over time during chronic viral infections such as HIV or Hepatitis B?","options":["Tolerance","T-cell exhaustion","Latency","Transformation"],"answer":1,"explanation":"T-cell exhaustion refers to the progressive loss of T-cell potency and function during chronic viral infections such as HIV, HBV, or HCV."},{"id":19,"topic":"Host Defenses","question":"A 60-year-old patient with chronic smoking and COPD develops secondary bacterial pneumonia. The most likely reason for this susceptibility is:","options":["Increased gastric pH","Impaired mucociliary clearance in the respiratory tract","Loss of the epidermal barrier","Defective IgE production"],"answer":1,"explanation":"Smoking and COPD cause ciliary paralysis and impair mucociliary clearance in the respiratory tract, increasing susceptibility to secondary bacterial pneumonia."},{"id":20,"topic":"Viral Pathogenesis","question":"Which of the following is a direct cytopathic effect of poliovirus?","options":["Integration into the host genome","Induction of B-cell tumors","Inactivation of host cap-binding protein to stop protein synthesis","Production of aflatoxin"],"answer":2,"explanation":"A direct cytopathic effect of poliovirus is the inactivation of host cap-binding protein, which stops host protein synthesis while allowing viral mRNA translation."},{"id":21,"topic":"Viral Pathogenesis","question":"The predilection for viruses to infect only specific cell types is known as:","options":["Invasiveness","Tropism","Heterophagy","Autophagy"],"answer":1,"explanation":"The predilection for viruses to infect only specific cell types (determined by receptor-ligand interactions) is known as viral tropism."},{"id":22,"topic":"Bacterial Virulence","question":"Bacterial virulence genes are often found grouped together in the genome in clusters called:","options":["Plasmids","Pathogenicity islands","Biofilms","Quorum centers"],"answer":1,"explanation":"Virulence genes in bacteria are frequently grouped together in the genome in clusters called pathogenicity islands, often acquired by horizontal gene transfer."},{"id":23,"topic":"Bacterial Virulence","question":"Which mobile genetic element is most frequently associated with the spread of antibiotic resistance between bacterial species?","options":["Bacteriophages","Plasmids","Introns","Exons"],"answer":1,"explanation":"Plasmids are the mobile genetic elements most frequently associated with the spread of acquired antibiotic resistance genes between bacterial species."},{"id":24,"topic":"Bacterial Virulence","question":"Quorum sensing in bacterial populations is mediated by the secretion of:","options":["Exotoxins","Autoinducer molecules","Opsonins","Lytic enzymes"],"answer":1,"explanation":"Quorum sensing in bacterial populations is mediated by the secretion and detection of autoinducer molecules that coordinate group gene expression."},{"id":25,"topic":"Bacterial Virulence","question":"A 45-year-old woman with a prosthetic heart valve develops persistent fever. Blood cultures show a slow-growing bacterium protected by a viscous layer of extracellular polysaccharides. This structure is a:","options":["Granuloma","Capsule","Biofilm","Bubo"],"answer":2,"explanation":"Biofilms are microbial communities protected by a viscous layer of extracellular polysaccharides that reduce susceptibility to host defenses and antibiotics."},{"id":26,"topic":"Bacterial Virulence","question":"Which bacterial surface structure acts as a 'syringe' to inject proteins into host cells via a type III secretion system?","options":["Tip fibrillum","Pili","Flagella","Cell wall peptidoglycan"],"answer":1,"explanation":"Some gram-negative bacteria use a specialized pilus-like structure as a type III secretion system to inject virulence proteins directly into host cells."},{"id":27,"topic":"Bacterial Virulence","question":"The Lipid A component of lipopolysaccharide (LPS) is also known as:","options":["Exotoxin","Endotoxin","Superantigen","Adhesin"],"answer":1,"explanation":"The Lipid A component of LPS is the part responsible for its endotoxin activity, triggering TLR4 and causing septic shock."},{"id":28,"topic":"Bacterial Virulence","question":"High levels of endotoxin play a major pathogenic role in:","options":["Tuberculoid leprosy","Septic shock and DIC","Allergic rhinitis","Viral transformation"],"answer":1,"explanation":"High levels of endotoxin (LPS) induce excessive cytokine production that plays a major pathogenic role in septic shock and disseminated intravascular coagulation (DIC)."},{"id":29,"topic":"Bacterial Virulence","question":"Bacterial A-B toxins consist of a 'B' subunit that binds to the cell surface and an 'A' subunit that:","options":["Forms a mechanical barrier","Possesses enzymatic activity to alter cell function","Acts as an opsonin","Triggers the classical complement pathway"],"answer":1,"explanation":"In bacterial A-B toxins, the A (active) subunit possesses enzymatic activity that enters the host cell and alters its function, while B (binding) mediates entry."},{"id":30,"topic":"Bacterial Virulence","question":"Superantigens cause systemic inflammatory response syndrome by:","options":["Inhibiting all T-cell responses","Binding to conserved portions of the TCR and MHC, causing massive cytokine release","Blocking the release of acetylcholine","Degrading host cell DNA"],"answer":1,"explanation":"Superantigens cause systemic inflammation by binding to conserved portions of the T-cell receptor and MHC II, leading to massive polyclonal T-cell activation and cytokine release."},{"id":31,"topic":"Tissue Responses","question":"Suppurative (purulent) inflammation is characterized by the accumulation of:","options":["Epithelioid macrophages","Dying neutrophils and liquefactive tissue necrosis","Multinucleated giant cells","Viral inclusion bodies"],"answer":1,"explanation":"Suppurative inflammation is defined by the accumulation of pus, consisting of dying neutrophils and liquefied debris of necrotic cells."},{"id":32,"topic":"Bacterial Virulence","question":"The 'fleur-de-lis' pattern of necrotizing pneumonia featuring vascular thrombosis and masses of organisms is characteristic of:","options":["Streptococcus pneumoniae","Pseudomonas aeruginosa","Mycobacterium tuberculosis","Measles virus"],"answer":1,"explanation":"Necrotizing pneumonia featuring a fleur-de-lis pattern of vascular thrombosis and masses of organisms is characteristic of Pseudomonas aeruginosa."},{"id":33,"topic":"Tissue Responses","question":"A patient presents with a large, painless indurated ulcer on the penis with a dense plasma cell infiltrate and proliferative endarteritis. This lesion is most likely a:","options":["Bubo","Soft chancre (Chancroid)","Syphilitic chancre","Gumma"],"answer":2,"explanation":"The primary chancre of syphilis is a firm, painless, indurated ulcer featuring a plasma cell infiltrate and proliferative endarteritis (obliterative endarteritis)."},{"id":34,"topic":"Tissue Responses","question":"Which histologic pattern is typically seen in response to viruses, intracellular bacteria, or intracellular parasites?","options":["Suppurative inflammation","Chronic inflammation and scarring","Diffuse mononuclear interstitial infiltrates","Fat necrosis"],"answer":2,"explanation":"Diffuse mononuclear interstitial infiltrates are characteristic histologic responses to viruses and intracellular pathogens."},{"id":35,"topic":"Tissue Responses","question":"Granulomatous inflammation is a cellular attempt to:","options":["Increase vascular permeability rapidly","Contain an offending agent that is difficult to eradicate","Promote rapid epithelial regeneration","Induce apoptosis in all nearby cells"],"answer":1,"explanation":"Granulomatous inflammation is a cellular attempt to wall off or contain an offending agent that is resistant to eradication by standard acute inflammation."},{"id":36,"topic":"Viral Pathogenesis","question":"The Warthin-Finkeldey giant cells found in the lung and lymphoid tissue are pathognomonic for:","options":["Mumps","Tuberculosis","Measles","HIV"],"answer":2,"explanation":"Warthin-Finkeldey giant cells with eosinophilic inclusions are pathognomonic for measles infection."},{"id":37,"topic":"Tissue Responses","question":"A 'pseudomembrane' consisting of a tough, dirty gray layer of necrotic epithelium and fibrinosuppurative exudate in the pharynx is typical of:","options":["Scarlet fever","Diphtheria","Infectious mononucleosis","Candidiasis"],"answer":1,"explanation":"C. diphtheriae infection causes a tough, dirty gray pseudomembrane of necrotic epithelium and fibrinosuppurative exudate in the pharynx."},{"id":38,"topic":"Bacterial Virulence","question":"The anthrax 'lethal factor' (LF) acts as a protease that destroys:","options":["Elongation factor-2","Mitogen-activated protein kinase kinases (MAPKKs)","Acetylcholine receptors","DNA polymerase"],"answer":1,"explanation":"The anthrax lethal factor (LF) acts as a protease that destroys MAPKKs (mitogen-activated protein kinase kinases), leading to cell death."},{"id":39,"topic":"Bacterial Virulence","question":"Slender gram-positive organisms arranged in branching filaments that stain with modified acid-fast stains are:","options":["Actinomyces spp.","Nocardia spp.","Staphylococcus aureus","Bacillus anthracis"],"answer":1,"explanation":"Nocardia spp. appear in tissue as slender gram-positive organisms in branching filaments that are weakly acid-fast on modified Ziehl-Neelsen staining."},{"id":40,"topic":"Viral Pathogenesis","question":"Which host receptor is used by Epstein-Barr virus (EBV) to attach to and infect B cells?","options":["CD4","CD21 (Complement receptor 2)","CXCR4","Toll-like receptor 4"],"answer":1,"explanation":"Epstein-Barr virus (EBV) uses the CD21 (complement receptor 2) on B cells to attach and gain entry for infection."},{"id":41,"topic":"Parasitic Infections","question":"The ability of Plasmodium falciparum to cause cerebral malaria is primarily due to:","options":["Its ability to infect only old red cells","Red cell clumping and sequestration in small blood vessels","Direct infection of neurons","Production of a potent neurotoxin"],"answer":1,"explanation":"Cerebral malaria in P. falciparum infection is caused by the clumping and sequestration of parasitized red cells in small blood vessels, causing ischemia."},{"id":42,"topic":"Parasitic Infections","question":"A child in a high malaria prevalence area is resistant to Plasmodium vivax. This is most likely due to a lack of:","options":["Hemoglobin S","G6PD","Duffy blood group antigen","Vitamin D"],"answer":2,"explanation":"Resistance to Plasmodium vivax is primarily due to a lack of the Duffy blood group antigen on red cells, which the parasite uses for entry."},{"id":43,"topic":"Immune Evasion","question":"Which parasite is known to undergo 'phenotypic switching' between nine distinct cell shapes to adapt to the host environment?","options":["Candida albicans","Toxoplasma gondii","Trypanosoma brucei","Leishmania donovani"],"answer":0,"explanation":"Candida albicans can undergo phenotypic switching between nine distinct cell shapes (yeast, pseudohypha, hypha) to adapt to different host environments."},{"id":44,"topic":"Fungal Infections","question":"'Soap-bubble' lesions in the brain of an immunosuppressed patient are characteristic of:","options":["Toxoplasmosis","Cryptococcosis","Aspergillosis","Mucormycosis"],"answer":1,"explanation":"Soap-bubble lesions in the brain are produced by masses of Cryptococcus neoformans growing in the perivascular Virchow-Robin spaces."},{"id":45,"topic":"Fungal Infections","question":"The presence of septate hyphae branching at acute (45-degree) angles is highly suggestive of:","options":["Mucor spp.","Rhizopus spp.","Aspergillus spp.","Candida pseudohyphae"],"answer":2,"explanation":"Aspergillus is characterized by septate hyphae that branch at acute 40\u201345 degree angles, distinguishing it from mucormycosis (wide, non-septate, right-angle branching)."},{"id":46,"topic":"Parasitic Infections","question":"Which form of Leishmaniasis is characterized by 'kala-azar' (systemic disease with hepatosplenomegaly)?","options":["Cutaneous","Mucocutaneous","Visceral","Diffuse cutaneous"],"answer":2,"explanation":"Visceral leishmaniasis, also known as kala-azar, is a systemic disease involving the mononuclear phagocyte system causing hepatosplenomegaly, fever, and weight loss."},{"id":47,"topic":"Parasitic Infections","question":"A patient with Chagas disease presents with severe cardiac arrhythmias. The underlying mechanism involves:","options":["Direct invasion of myocytes and autoimmune cross-reactivity","Massive production of endotoxin","Formation of fungus balls in the heart","High levels of circulating IgM antibodies only"],"answer":0,"explanation":"Chagas heart disease involves both direct parasite invasion of myocytes and autoimmune cross-reactivity leading to myocarditis and arrhythmias."},{"id":48,"topic":"Parasitic Infections","question":"The most common opportunistic infection of the central nervous system in AIDS patients is:","options":["Cryptococcal meningitis","Toxoplasma encephalitis","JC virus","Herpes simplex encephalitis"],"answer":1,"explanation":"Toxoplasma encephalitis is the most common opportunistic pathogen of the CNS in AIDS patients, presenting with ring-enhancing lesions on CT/MRI."},{"id":49,"topic":"Immune Evasion","question":"Which mechanism allows African trypanosomes to cause successive waves of fever?","options":["Viral integration","Periodic release of spores","Programmed rearrangement of Variant Surface Glycoprotein (VSG) genes","Biofilm dispersal"],"answer":2,"explanation":"African trypanosomes cause successive waves of fever through programmed rearrangement of VSG genes, constantly changing their surface coat to escape host antibodies."},{"id":50,"topic":"Bacterial Virulence","question":"If an infectious process involves 'boxcar-shaped' gram-positive bacilli with gas bubbles in tissue, it would indicate:","options":["Anthrax","Clostridial gas gangrene","Bubonic plague","Secondary tuberculosis"],"answer":1,"explanation":"Boxcar-shaped gram-positive bacilli (Clostridium perfringens) associated with gas bubbles in tissue indicate gas gangrene (clostridial myonecrosis)."}]},{"chapter":7,"title":"Environmental and Nutritional Diseases","topics":["Physical Injuries","Thermal Injury","Radiation Injury","Nutritional Deficiencies","Vitamins","Obesity","Malnutrition"],"questions":[{"id":1,"topic":"Nutritional Deficiencies","question":"A 10-year-old child presents with bowing of the legs, a 'squared' head, and a 'rachitic rosary' at the costochondral junctions. This condition is primarily caused by a deficiency in:","options":["Vitamin A","Vitamin C","Vitamin D","Vitamin K"],"answer":2,"explanation":"Bowing legs, frontal bossing, and rachitic rosary (overgrowth of cartilage/osteoid at costochondral junctions) are classic skeletal deformities of rickets caused by Vitamin D deficiency."},{"id":2,"topic":"Physical Injuries","question":"Which term describes a mechanical injury produced by a blunt object that results in a bruise or hemorrhage into soft tissues without a break in the skin?","options":["Abrasion","Contusion","Laceration","Incision"],"answer":1,"explanation":"A contusion is a mechanical injury produced by a blunt object that results in a bruise or hemorrhage into soft tissues without a break in the skin."},{"id":3,"topic":"Thermal Injury","question":"In the classification of thermal burns, a 'full-thickness' burn is characterized by injury extending to the:","options":["Epidermis only","Dermis only","Subcutaneous tissue","Muscle only"],"answer":2,"explanation":"A full-thickness burn involves injury extending through the epidermis and dermis into the subcutaneous tissue, often with destruction of nerve endings."},{"id":4,"topic":"Thermal Injury","question":"Which of the following is a major contributor to the 'hypermetabolic state' observed in patients with extensive thermal burns?","options":["Decreased core temperature","Excess heat loss and increased nutritional needs","Reduced catecholamine levels","Fluid sequestration in the intracellular space"],"answer":1,"explanation":"Extensive thermal burns (over 40% of body surface) can double the metabolic rate because of significant heat loss and massive nutritional requirements for tissue repair."},{"id":5,"topic":"Thermal Injury","question":"A 24-year-old mountain climber found unconscious in the snow with a core temperature of 88\u00b0F. The direct tissue injury caused by this condition is primarily mediated by:","options":["Increased blood viscosity","Crystallization of intracellular and extracellular water","Reactive hyperaemia","Endothelial proliferation"],"answer":1,"explanation":"Direct hypothermic injury is mediated by the physical disruption of cells caused by crystallization of water and high salt concentrations within the cells."},{"id":6,"topic":"Radiation Injury","question":"The 'threshold effect' in radiation injury refers to the observation that:","options":["Small doses to the whole body are safer than large doses to a small field","Quiescent cells are more sensitive than rapidly dividing cells","Tissues reach a point of dysfunction only after a certain level of damage","DNA repair is impossible at any dose level"],"answer":2,"explanation":"The threshold effect suggests that a minimum amount of damage (such as oxidative stress) must be present before clinical disease or dysfunction becomes evident."},{"id":7,"topic":"Radiation Injury","question":"Which unit is used to express the 'equivalent dose' of radiation, taking into account the biologic effectiveness of different types of radiation?","options":["Gray (Gy)","Curie (Ci)","Sievert (Sv)","Rad (R)"],"answer":2,"explanation":"The Sievert is the unit used to express the equivalent dose of radiation, which normalizes the physical absorbed dose (Grays) against the varying biologic effectiveness of different radiation types."},{"id":8,"topic":"Malnutrition","question":"Severe acute malnutrition (SAM) is defined by the WHO as a weight-for-height ratio that is how many standard deviations below the normal range?","options":["1","2","3","5"],"answer":2,"explanation":"The WHO defines severe acute malnutrition (SAM) as a weight-for-height ratio that is 3 or more standard deviations below the normal range."},{"id":9,"topic":"Malnutrition","question":"In marasmus, the body primarily utilizes which protein compartment as a source of energy?","options":["Visceral protein compartment","Somatic protein compartment","Hepatic protein compartment","Plasma albumin compartment"],"answer":1,"explanation":"Marasmus is characterized by catabolism of the somatic protein compartment (skeletal muscle) as an energy source once adipose stores are depleted."},{"id":10,"topic":"Malnutrition","question":"A 3-year-old child presents with generalized edema, a 'flaky paint' skin appearance, and an enlarged fatty liver. Serum albumin is significantly low. This is most consistent with:","options":["Marasmus","Kwashiorkor","Scurvy","Anorexia nervosa"],"answer":1,"explanation":"Kwashiorkor is defined by a diet deficient in protein (not necessarily total calories), leading to hypoalbuminemia, generalized edema, flaky paint skin, and an enlarged fatty liver."},{"id":11,"topic":"Malnutrition","question":"Which mechanism explains the development of a fatty liver in patients with Kwashiorkor?","options":["Increased intake of dietary fats","Reduced synthesis of the carrier protein component of lipoproteins","Excessive mobilization of peripheral fat stores","Inhibition of mitochondrial beta-oxidation by high cortisol"],"answer":1,"explanation":"The fatty liver in Kwashiorkor results from a deficiency in carrier proteins (apoproteins) needed to export triglycerides from the liver into the blood."},{"id":12,"topic":"Malnutrition","question":"A 19-year-old woman with extreme weight loss, amenorrhea, and cold intolerance is at high risk for sudden death due to:","options":["Hypoglycemic shock","Cardiac arrhythmia resulting from hypokalemia","Multi-organ failure from sepsis","Spontaneous gastric rupture"],"answer":1,"explanation":"Patients with anorexia nervosa are at high risk for sudden death primarily due to electrolyte imbalances, specifically hypokalemia, which triggers fatal cardiac arrhythmias."},{"id":13,"topic":"Vitamins","question":"Which of the following is an early manifestation of Vitamin A deficiency?","options":["Keratomalacia","Bitot spots","Night blindness","Osteomalacia"],"answer":2,"explanation":"One of the earliest clinical signs of Vitamin A deficiency is night blindness, caused by the depletion of rhodopsin in the rod cells of the retina."},{"id":14,"topic":"Vitamins","question":"Vitamin A regulates the orderly differentiation of epithelium. In its absence, specialized columnar epithelium often undergoes:","options":["Atrophy","Squamous metaplasia","Dysplasia","Anaplasia"],"answer":1,"explanation":"Vitamin A is essential for the orderly differentiation of mucus-secreting epithelium; in its absence, specialized columnar epithelium is replaced by keratinizing squamous epithelium."},{"id":15,"topic":"Vitamins","question":"The active form of Vitamin D [1,25(OH)2D3] is synthesized in which organ?","options":["Skin","Liver","Kidney","Small Intestine"],"answer":2,"explanation":"While the liver performs the first hydroxylation step, the final conversion of Vitamin D into its most active form (1,25-dihydroxyvitamin D) is performed by 1\u03b1-hydroxylase in the kidney."},{"id":16,"topic":"Vitamins","question":"Which enzyme is upregulated by hypocalcemia to increase the production of active Vitamin D?","options":["25-hydroxylase","1\u03b1-hydroxylase","Tyrosinase","Lysyl hydroxylase"],"answer":1,"explanation":"Hypocalcemia stimulates PTH secretion, which directly upregulates 1\u03b1-hydroxylase in the kidney to increase active Vitamin D production."},{"id":17,"topic":"Vitamins","question":"Vitamin C is essential for the stabilization of collagen because it acts as a cofactor for the:","options":["Carboxylation of glutamate residues","Hydroxylation of proline and lysine residues","Cross-linking of elastin fibers","Synthesis of thyroid hormone"],"answer":1,"explanation":"Vitamin C acts as a cofactor for the enzymes that hydroxylate procollagen, a step required for the stable cross-linking and tensile strength of collagen fibers."},{"id":18,"topic":"Vitamins","question":"A 70-year-old man consuming only tea and toast presents with perifollicular hemorrhages, bleeding gums, and painful joints. The biochemical defect involves:","options":["Defective mineralization of osteoid","Impaired formation of collagen hydroxyproline","Failure of epithelial keratinization","Reduced calcium absorption in the duodenum"],"answer":1,"explanation":"Scurvy results from the inability to form stable collagen due to defective hydroxylation of proline, leading to fragile blood vessels and poor wound healing."},{"id":19,"topic":"Obesity","question":"Obesity is defined by a Body Mass Index (BMI) greater than:","options":["20 kg/m\u00b2","25 kg/m\u00b2","30 kg/m\u00b2","40 kg/m\u00b2"],"answer":2,"explanation":"Obesity is clinically defined by a Body Mass Index (BMI) greater than 30 kg/m\u00b2."},{"id":20,"topic":"Obesity","question":"Which adipokine is known as the 'guardian angel against obesity' because it increases insulin sensitivity and has anti-inflammatory effects?","options":["Leptin","Ghrelin","Adiponectin","Resistin"],"answer":2,"explanation":"Adiponectin is referred to as the guardian angel against obesity because it increases insulin sensitivity, stimulates fatty acid oxidation, and exerts anti-inflammatory effects."},{"id":21,"topic":"Obesity","question":"Leptin decreases appetite by acting on neurons in the arcuate nucleus of the:","options":["Thalamus","Hypothalamus","Medulla oblongata","Cerebral cortex"],"answer":1,"explanation":"Leptin is a fat-derived hormone that travels to the hypothalamus, specifically the arcuate nucleus, to inhibit appetite and increase energy expenditure."},{"id":22,"topic":"Obesity","question":"The 'Pickwickian syndrome' refers to which complication of obesity?","options":["Nonalcoholic fatty liver disease","Hypoventilation syndrome","Cholelithiasis","Osteoarthritis"],"answer":1,"explanation":"Pickwickian syndrome is a constellation of respiratory abnormalities and hypoventilation that occurs in individuals with severe obesity due to restricted chest wall movement."},{"id":23,"topic":"Obesity","question":"Which hormone, produced by the stomach, is an 'orexigenic' signal that increases food intake?","options":["Insulin","Ghrelin","Peptide YY","Glucagon-like peptide-1 (GLP-1)"],"answer":1,"explanation":"Ghrelin is an appetite-stimulating (orexigenic) hormone produced by the stomach that increases food intake and is elevated in fasting states."},{"id":24,"topic":"Radiation Injury","question":"In the context of ionizing radiation, 'fractionation' refers to:","options":["Delivering radiation to a large field size","Dividing the radiation dose to allow normal cells to repair","The process of free radical formation from water","The separation of alpha and beta particles"],"answer":1,"explanation":"Fractionation involves delivering radiation in small, divided doses to exploit the fact that normal cells repair DNA damage more effectively than tumor cells between exposures."},{"id":25,"topic":"Radiation Injury","question":"A worker accidentally exposed to a total-body dose of 15 Sv develops severe diarrhea, fever, and electrolyte imbalances within days. The primary site of injury is the:","options":["Bone marrow","Small bowel","Brain","Skin"],"answer":1,"explanation":"A total-body radiation dose between 10 and 20 Sv primarily targets the gastrointestinal tract, leading to severe diarrhea, electrolyte imbalance, and near 100% lethality."},{"id":26,"topic":"Radiation Injury","question":"Which of the following tissues is most resistant to radiation-induced injury?","options":["Gonads","Bone marrow","Neurons","GI mucosa"],"answer":2,"explanation":"Rapidly dividing cells (germ cells, bone marrow, GI mucosa) are highly radiosensitive, whereas non-dividing terminally differentiated cells like adult neurons are highly resistant."},{"id":27,"topic":"Physical Injuries","question":"'Trench foot' is an example of a physical injury caused by:","options":["Rapid chilling leading to frostbite","Slow chilling and high humidity causing ischemic injury","Electrical current disrupting the heart rhythm","High-altitude atmospheric pressure changes"],"answer":1,"explanation":"Trench foot is caused by slow chilling and wet conditions that lead to persistent vasoconstriction and subsequent ischemic injury and gangrene."},{"id":28,"topic":"Thermal Injury","question":"Heat stroke is distinguished from heat exhaustion by:","options":["The presence of muscle cramps","The failure of thermoregulatory mechanisms and core temperature >40\u00b0C","A rapid recovery after rehydration","The preservation of sweating"],"answer":1,"explanation":"Heat stroke is a medical emergency marked by the failure of thermoregulatory mechanisms, cessation of sweating, and a core body temperature exceeding 40\u00b0C."},{"id":29,"topic":"Physical Injuries","question":"Which genetic mutation is associated with 'Malignant Hyperthermia' following anesthesia?","options":["FBN1","RYR1","CFTR","LDLR"],"answer":1,"explanation":"Malignant hyperthermia is a genetic condition caused by mutations in the RYR1 gene (ryanodine receptor), which regulates calcium release in skeletal muscle."},{"id":30,"topic":"Physical Injuries","question":"A high-voltage electrical injury is most likely to cause death through:","options":["Intracellular salt crystallization","Paralysis of medullary centers or ventricular fibrillation","Scurvy-like hemorrhages","Chronic interstitial fibrosis"],"answer":1,"explanation":"Fatal electrical injury most commonly results from the current disrupting the brain's medullary respiratory centers or causing the heart to enter ventricular fibrillation."},{"id":31,"topic":"Physical Injuries","question":"In children, the presence of 'lead lines' on radiographs of long bones indicates:","options":["Areas of severe osteoporosis","Increased density due to impaired remodeling of calcified cartilage","Focal areas of liquefactive necrosis","Metaplastic bone formation in muscle"],"answer":1,"explanation":"Lead lines on x-rays of long bones in children represent radiodense zones where lead has interfered with the normal remodeling of calcified cartilage."},{"id":32,"topic":"Vitamins","question":"A 'Bitot spot' is a clinical finding associated with:","options":["Vitamin D toxicity","Vitamin A deficiency","Chronic lead poisoning","Mechanical trauma to the cornea"],"answer":1,"explanation":"Bitot spots are small, opaque plaques of keratin debris found on the conjunctiva, a sign of advanced Vitamin A deficiency."},{"id":33,"topic":"Vitamins","question":"The absorption of Vitamin D from the diet is dependent on the presence of:","options":["Intrinsic factor","Bile and pancreatic enzymes","Hydrochloric acid in the stomach","Vitamin C for stabilization"],"answer":1,"explanation":"Vitamin D is fat-soluble, and its absorption in the gut is critically dependent on proper lipid digestion involving bile and pancreatic enzymes."},{"id":34,"topic":"Nutritional Deficiencies","question":"Which mineral deficiency is associated with 'Acrodermatitis enteropathica'?","options":["Iron","Iodine","Zinc","Copper"],"answer":2,"explanation":"Acrodermatitis enteropathica is a disorder resulting from zinc deficiency that manifests as a characteristic skin rash around mucosal orifices and extremities."},{"id":35,"topic":"Thermal Injury","question":"During a heat wave, a 75-year-old man is found collapsed with no sweating, hot and dry skin. This condition is caused by:","options":["A failure of the cardiovascular system to compensate for hypovolemia","Excessive nitrosylation of ryanodine receptors in skeletal muscle","A primary deficiency in Vitamin B1","Localized vasoconstriction from trench foot"],"answer":0,"explanation":"Heat exhaustion occurs when the cardiovascular system cannot maintain adequate output due to dehydration and hypovolemia from excessive sweating and heat exposure."},{"id":36,"topic":"Vitamins","question":"Which vitamin deficiency is specifically linked to the 'Three Ds': Dementia, Dermatitis, and Diarrhea (Pellagra)?","options":["Riboflavin (B2)","Niacin","Pyridoxine (B6)","Folate"],"answer":1,"explanation":"Pellagra is the clinical result of niacin (Vitamin B3) deficiency and is classically identified by the Three Ds: Dermatitis, Diarrhea, and Dementia."},{"id":37,"topic":"Radiation Injury","question":"The major mechanism of DNA damage by ionizing radiation is the generation of:","options":["Pyrimidine dimers","Reactive oxygen species (ROS) from radiolysis of water","Cross-linking of histones","Direct cleavage of the sugar-phosphate backbone by neutrons"],"answer":1,"explanation":"The major mechanism of DNA damage by ionizing radiation is the indirect effect, where radiation hydrolyzes water into free radicals (ROS) that then attack the DNA."},{"id":38,"topic":"Physical Injuries","question":"A 'laceration' in forensic pathology is defined as:","options":["A superficial scraping of the skin","A clean-cut wound produced by a sharp instrument","An irregular tear in the tissue produced by blunt force trauma","A deep penetration by a narrow, pointed object"],"answer":2,"explanation":"In forensic pathology, a laceration is specifically defined as an irregular tear in the skin or tissue caused by blunt force, often showing tissue bridging at the edges."},{"id":39,"topic":"Vitamins","question":"In the 'Intrinsic Pathway' of Vitamin D action, the vitamin binds to a nuclear receptor that must heterodimerize with which other receptor?","options":["Thyroid hormone receptor","Retinoic X receptor (RXR)","Estrogen receptor","PTH receptor"],"answer":1,"explanation":"The active Vitamin D receptor complex is a heterodimer formed when the Vitamin D receptor (VDR) binds with the Retinoic X receptor (RXR)."},{"id":40,"topic":"Nutritional Deficiencies","question":"'Craniotabes' is a clinical sign of rickets involving the:","options":["Long bones of the legs","Costochondral junctions","Occipital and parietal bones of the skull","Vertebral bodies"],"answer":2,"explanation":"Craniotabes is a sign of rickets in infants where the softened occipital and parietal bones of the skull can be buckled inward by pressure."},{"id":41,"topic":"Vitamins","question":"A 50-year-old chronic alcoholic is brought to the ER with confusion and ataxia due to a severe Vitamin B1 deficiency. This condition is known as:","options":["Beriberi","Wernicke-Korsakoff syndrome","Scurvy","Xerophthalmia"],"answer":1,"explanation":"Wernicke-Korsakoff syndrome is the classic neurologic consequence of Vitamin B1 (thiamine) deficiency, frequently seen in chronic alcoholics."},{"id":42,"topic":"Nutritional Deficiencies","question":"High-fiber diets are thought to decrease the risk of colon cancer by:","options":["Increasing the levels of bile acids","Decreasing the transit time and increasing stool bulk","Directly inhibiting the P-450 system","Acting as a pro-carcinogen"],"answer":1,"explanation":"High-fiber diets are protective against colon cancer by increasing stool mass and decreasing the time the colonic mucosa is exposed to potential carcinogens."},{"id":43,"topic":"Obesity","question":"Which form of adipose tissue is responsible for 'nonshivering thermogenesis' and is more abundant in newborns?","options":["White adipose tissue (WAT)","Brown adipose tissue (BAT)","Visceral adipose tissue","Subcutaneous adipose tissue"],"answer":1,"explanation":"Brown adipose tissue (BAT) is specialized for nonshivering thermogenesis, expending energy by uncoupling oxidative phosphorylation to produce heat instead of ATP."},{"id":44,"topic":"Nutritional Deficiencies","question":"Which trace element is a critical component of thyroid hormones?","options":["Zinc","Selenium","Iodine","Copper"],"answer":2,"explanation":"Iodine is a critical trace element and an essential component of the thyroid hormones T3 (triiodothyronine) and T4 (thyroxine)."},{"id":45,"topic":"Vitamins","question":"'Osteomalacia' refers to:","options":["Overgrowth of epiphyseal cartilage in children","Inadequate mineralization of newly formed osteoid in adults","Increased bone resorption by osteoclasts in Vitamin A toxicity","Metastatic calcification of soft tissues"],"answer":1,"explanation":"Osteomalacia is the adult equivalent of rickets, occurring when the normal bone remodeling process produces osteoid that cannot be properly mineralized due to Vitamin D deficiency."},{"id":46,"topic":"Radiation Injury","question":"A patient undergoing radiation therapy for prostate cancer develops narrowing of the pelvic blood vessels several months later. This is due to:","options":["Acute fibrinoid necrosis","Endothelial cell proliferation and collagenous hyalinization","Tetanic muscle spasm","Scurvy-like fragility of the vessels"],"answer":1,"explanation":"Late or chronic effects of radiation on blood vessels involve narrowing of the lumen due to subintimal fibrosis and endothelial proliferation (radiation-induced arteriosclerosis)."},{"id":47,"topic":"Vitamins","question":"S
