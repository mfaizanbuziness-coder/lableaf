curvy is most likely to be seen in which of the following populations in high-income countries?","options":["Young athletes","Pregnant women","Older individuals living alone or chronic alcoholics","Individuals with high sun exposure"],"answer":2,"explanation":"Scurvy remains a risk in high-income countries among older individuals living alone and chronic alcoholics due to inadequate or erratic dietary patterns."},{"id":48,"topic":"Vitamins","question":"Which vitamin deficiency is associated with 'spinocerebellar degeneration'?","options":["Vitamin A","Vitamin D","Vitamin E","Vitamin K"],"answer":2,"explanation":"A deficiency in Vitamin E, a major fat-soluble antioxidant, can lead to the degeneration of the spinocerebellar tracts causing ataxia."},{"id":49,"topic":"Vitamins","question":"'Wet beriberi' is a manifestation of thiamine deficiency that primarily affects the:","options":["Central nervous system","Peripheral nerves","Cardiovascular system","Skin"],"answer":2,"explanation":"Wet beriberi is a thiamine deficiency syndrome that primarily manifests as high-output heart failure and edema due to cardiovascular involvement."},{"id":50,"topic":"Nutritional Deficiencies","question":"The 'Ghon complex' is a hallmark of which disease (which often reactivates in the malnourished)?","options":["Rickets","Tuberculosis","Scurvy","Pellagra"],"answer":1,"explanation":"The Ghon complex, consisting of a parenchymal lung lesion and involvement of the regional lymph nodes, is the hallmark of primary tuberculosis."}]},{"chapter":8,"title":"Miscellaneous Topics","topics":["Anemia","Fever","Hypertension","Diarrhea","Peptic Ulcer","Miscellaneous Pathology"],"questions":[{"id":1,"topic":"Anemia","question":"Which of the following is the most common cause of anemia worldwide?","options":["Vitamin B12 deficiency","Chronic blood loss","Folate deficiency","Hemolysis"],"answer":1,"explanation":"Iron deficiency is the most common cause of anemia worldwide, and in developed countries this is most frequently related to chronic blood loss from the gastrointestinal tract."},{"id":2,"topic":"Anemia","question":"Iron deficiency anemia is morphologically characterized by red cells that are:","options":["Macrocytic and hyperchromic","Normocytic and normochromic","Microcytic and hypochromic","Macrocytic and normochromic"],"answer":2,"explanation":"Iron deficiency anemia produces a decreased mean corpuscular volume (microcytic) and pale red cells on peripheral film (hypochromic)."},{"id":3,"topic":"Anemia","question":"The presence of 'pencil cells' on a peripheral blood film is most suggestive of:","options":["Sickle cell disease","Iron deficiency anemia","Beta-thalassemia","Megaloblastic anemia"],"answer":1,"explanation":"The peripheral blood film of a patient with iron deficiency typically shows long elliptical red cells known as pencil cells (also called cigar cells)."},{"id":4,"topic":"Anemia","question":"A 65-year-old male with unexplained iron deficiency anemia. Which of the following is a mandatory clinical step?","options":["Start high-dose iron supplements and reassess in 6 months","Rule out gastrointestinal tract malignancy","Perform a bone marrow biopsy immediately","Check for vitamin C deficiency"],"answer":1,"explanation":"It is clinically mandatory to rule out a gastrointestinal tract malignancy in any adult patient presenting with unexplained iron deficiency anemia."},{"id":5,"topic":"Anemia","question":"Megaloblastic anemia results from impaired synthesis of:","options":["Heme","Globin chains","DNA","Cell membrane proteins"],"answer":2,"explanation":"Megaloblastic anemia results from impaired erythroid DNA synthesis, because vitamin B12 and folate are required to synthesize molecules necessary for DNA replication."},{"id":6,"topic":"Anemia","question":"A 30-year-old strict vegan presents with fatigue and tingling in her feet with a high MCV. The most likely cause is deficiency of:","options":["Iron","Vitamin B12","Folate","Vitamin C"],"answer":1,"explanation":"Vitamin B12 is found only in animal products, and its deficiency \u2014 common in strict vegans \u2014 results in megaloblastic (macrocytic) anemia and neurological symptoms like peripheral tingling."},{"id":7,"topic":"Anemia","question":"The point mutation responsible for Sickle Cell Hemoglobin (HbS) involves the replacement of:","options":["Glutamine by Valine","Valine by Glutamine","Lysine by Glutamine","Phenylalanine by Tyrosine"],"answer":0,"explanation":"HbS results from a point mutation in the beta-globin gene causing substitution of glutamic acid (glutamine) by valine at position 6, making hemoglobin prone to polymerization under low oxygen."},{"id":8,"topic":"Miscellaneous Pathology","question":"Which clinical finding is part of the 'late manifestations' of congenital syphilis?","options":["Snuffles","Hutchinson teeth","Desquamating rash","Hepatomegaly"],"answer":1,"explanation":"Late manifestations of congenital syphilis include Hutchinson teeth \u2014 small incisors shaped like a screwdriver or peg with enamel notches."},{"id":9,"topic":"Anemia","question":"Anemia of chronic disease is often associated with elevated levels of which cytokine?","options":["IL-4","IL-10","IL-6","IL-13"],"answer":2,"explanation":"In anemia of chronic disease, inflammatory cytokines such as IL-6 lead to a reduction in the marrow's sensitivity to erythropoietin and increased hepcidin production."},{"id":10,"topic":"Anemia","question":"A child develops fever and jaundice after eating fava beans. The most likely underlying condition is:","options":["Beta-thalassemia major","G6PD deficiency","Sickle cell trait","Hereditary spherocytosis"],"answer":1,"explanation":"Individuals with G6PD deficiency are susceptible to acute hemolytic episodes with fever and jaundice following oxidant stress, such as eating fava beans."},{"id":11,"topic":"Fever","question":"Substances that induce fever by resetting the hypothalamic steady-state temperature are known as:","options":["Opsonins","Pyrogens","Chemokines","Selectins"],"answer":1,"explanation":"Substances that induce fever by resetting the hypothalamic steady-state temperature to a higher level are called pyrogens."},{"id":12,"topic":"Fever","question":"Which cytokine acts as a major 'endogenous pyrogen'?","options":["IL-8","TNF","IFN-gamma","TGF-beta"],"answer":1,"explanation":"Endogenous pyrogens are cytokines produced by the host, principally interleukin-1 (IL-1) and tumor necrosis factor (TNF), which act on the hypothalamus."},{"id":13,"topic":"Fever","question":"In the hypothalamus, the production of which mediator is responsible for raising the body temperature set-point?","options":["Prostaglandin E2 (PGE2)","Thromboxane A2","Leukotriene B4","Histamine"],"answer":0,"explanation":"In the hypothalamus, PGE2 stimulates the production of neurotransmitters that reset the body's steady-state temperature to a higher level, producing fever."},{"id":14,"topic":"Miscellaneous Pathology","question":"A 20-year-old student presents with fever, sore throat, splenomegaly, and large atypical lymphocytes on blood film. Which test would confirm Infectious Mononucleosis?","options":["Widal test","Monospot test (heterophile antibody)","ASOT (Antistreptolysin O titer)","PPD skin test"],"answer":1,"explanation":"Infectious mononucleosis is caused by EBV and is often diagnosed by detecting heterophile antibodies using the Monospot test."},{"id":15,"topic":"Fever","question":"The paroxysmal fevers and chills in malaria occur due to the release of:","options":["Sporozoites from the skin","Merozoites from ruptured red blood cells","Trophozoites into the liver","Gametocytes into the mosquito"],"answer":1,"explanation":"In malaria, the rupture of infected red cells releases merozoites and other proteins that induce host cytokines, leading to characteristic paroxysmal fevers and chills."},{"id":16,"topic":"Hypertension","question":"Secondary hypertension accounts for approximately what percentage of all hypertension cases?","options":["95%","50%","5%","80%"],"answer":2,"explanation":"Approximately 95% of hypertension cases are idiopathic (essential), while the remaining 5% are classified as secondary hypertension with an identifiable cause."},{"id":17,"topic":"Hypertension","question":"Which of the following is a common cause of secondary hypertension?","options":["Chronic kidney disease","High salt intake","Genetic susceptibility","Moderate alcohol consumption"],"answer":0,"explanation":"Chronic kidney disease is both a common cause of secondary hypertension and a complication of untreated primary hypertension."},{"id":18,"topic":"Hypertension","question":"The pathological term 'nephrosclerosis' in hypertension refers to:","options":["Liquefactive necrosis of the kidney","Hardening of the kidney due to vascular scarring","Formation of large renal cysts","Acute pyelonephritis"],"answer":1,"explanation":"Nephrosclerosis refers to the hardening of the kidney caused by medial hypertrophy and intimal thickening of the renal arteries in response to hypertension."},{"id":19,"topic":"Hypertension","question":"Hypertension increases the workload of the heart, leading initially to:","options":["Right ventricular failure","Left ventricular hypertrophy","Mitral valve prolapse","Pericarditis"],"answer":1,"explanation":"Pathological hypertrophy of the left ventricle occurs as an adaptation to the increased pressure workload imposed by systemic hypertension."},{"id":20,"topic":"Hypertension","question":"'Essential' hypertension is also known as:","options":["Secondary hypertension","Idiopathic hypertension","Malignant hypertension","Iatrogenic hypertension"],"answer":1,"explanation":"Essential hypertension has no identifiable underlying cause and is therefore described as idiopathic (primary) hypertension."},{"id":21,"topic":"Hypertension","question":"A 55-year-old male with long-standing hypertension presents with sudden, severe 'tearing' chest pain radiating to his back. This is most characteristic of:","options":["Myocardial infarction","Aortic dissection","Acute pericarditis","Pulmonary embolism"],"answer":1,"explanation":"Aortic dissection is a life-threatening condition often related to hypertension that presents with acute, severe tearing chest pain radiating to the back."},{"id":22,"topic":"Miscellaneous Pathology","question":"The 'shift to the left' seen in the blood during systemic inflammation refers to an increase in:","options":["Immature lymphocytes","Immature neutrophils (bands)","Large platelets","Mature eosinophils"],"answer":1,"explanation":"During systemic inflammation, the bone marrow accelerates the release of leukocytes, leading to an increase in immature neutrophils (band cells) in the blood."},{"id":23,"topic":"Diarrhea","question":"Which bacterial pathogen is a major cause of 'pseudomembranous colitis' following antibiotic use?","options":["Escherichia coli","Salmonella typhi","Clostridioides difficile","Vibrio cholerae"],"answer":2,"explanation":"C. difficile overgrows in the intestine when the normal microbiota is disrupted by antibiotics, releasing toxins A and B that cause pseudomembranous colitis."},{"id":24,"topic":"Diarrhea","question":"Enterotoxigenic E. coli (ETEC) causes diarrhea primarily by:","options":["Invading the colonic mucosa","Producing toxins that cause massive fluid loss","Forming granulomas in the ileum","Causing autoimmune destruction of enterocytes"],"answer":1,"explanation":"ETEC uses fimbriae to adhere to the small bowel and produces heat-labile and heat-stable toxins that result in massive fluid loss and secretory diarrhea."},{"id":25,"topic":"Diarrhea","question":"'Rice-water' stools are a classic clinical feature of infection by:","options":["Shigella spp.","Vibrio cholerae","Giardia lamblia","Entamoeba histolytica"],"answer":1,"explanation":"Infection by V. cholerae is characterized by non-inflammatory gastroenteritis and the passage of massive, watery rice-water stools due to cholera toxin."},{"id":26,"topic":"Diarrhea","question":"A 4-year-old child with chronic watery diarrhea and weight loss. A small bowel biopsy shows villous atrophy and crypt hyperplasia. The most likely diagnosis is:","options":["Crohn's disease","Coeliac disease","Ulcerative colitis","Whipple disease"],"answer":1,"explanation":"Coeliac disease is an autoimmune response to dietary gluten; characteristic histological findings include villous atrophy and crypt hyperplasia on small bowel biopsy."},{"id":27,"topic":"Diarrhea","question":"Which parasite attaches to the jejunal mucosa and is a leading cause of iron deficiency anemia worldwide?","options":["Enterobius vermicularis (pinworm)","Hookworms (Necator americanus)","Giardia lamblia","Toxoplasma gondii"],"answer":1,"explanation":"Hookworms (Necator americanus) attach to the jejunal mucosa and use a pump mechanism to ingest host blood, making them the most common parasitic cause of iron deficiency anemia worldwide."},{"id":28,"topic":"Diarrhea","question":"Diarrhea that is characteristically foul-smelling and associated with drinking contaminated well water is often caused by:","options":["Rotavirus","Giardia lamblia","Norovirus","Salmonella"],"answer":1,"explanation":"Giardia is a protozoan that attaches to the small bowel brush border and causes foul-smelling, greasy diarrhea, often after a host consumes contaminated water."},{"id":29,"topic":"Diarrhea","question":"'Cobblestoning' of the mucosal surface is a macroscopic hallmark of:","options":["Ulcerative colitis","Coeliac disease","Crohn's disease","Hirschsprung's disease"],"answer":2,"explanation":"A macroscopic hallmark of Crohn's disease is the cobblestone appearance of the mucosal surface caused by linear ulceration and intervening edema."},{"id":30,"topic":"Diarrhea","question":"Which of the following distinguishes Ulcerative Colitis from Crohn's disease?","options":["Presence of granulomas","Transmural inflammation","Involvement restricted to the large bowel mucosa","Frequent fistula formation"],"answer":2,"explanation":"Unlike Crohn's disease which can affect any part of the GI tract transmurally, ulcerative colitis is restricted to the mucosa of the large bowel."},{"id":31,"topic":"Peptic Ulcer","question":"The most consistent risk factor for the development of gastric carcinoma is:","options":["High fiber diet","Diet high in salt and nitrates","Use of probiotics","Excessive exercise"],"answer":1,"explanation":"A diet high in salt and nitrates is the most consistent risk factor for gastric carcinoma, as it promotes DNA damage in the gastric mucosa."},{"id":32,"topic":"Peptic Ulcer","question":"Helicobacter pylori is a major etiological factor for which of the following?","options":["Type 1 Diabetes","Duodenal ulcers","Acute viral hepatitis","Achalasia"],"answer":1,"explanation":"Chronic infection with H. pylori is the key etiological factor for the development of peptic duodenitis and duodenal ulcers."},{"id":33,"topic":"Peptic Ulcer","question":"A 'punched-out' mucosal defect with granulation tissue at the base describes the morphology of:","options":["A hyperplastic polyp","A chronic peptic ulcer","Carcinoma in situ","Squamous metaplasia"],"answer":1,"explanation":"Chronic peptic ulcers appear macroscopically as well-circumscribed, punched-out mucosal defects with granulation tissue at the base and surrounding mucosal folds."},{"id":34,"topic":"Peptic Ulcer","question":"Peptic duodenitis is typically associated with an excess of:","options":["Bile salts","Gastric acid","Pancreatic lipase","Vitamin B12"],"answer":1,"explanation":"Peptic duodenitis is defined as inflammation or ulceration of the duodenal mucosa specifically due to excess gastric acid entering the duodenum."},{"id":35,"topic":"Peptic Ulcer","question":"A 45-year-old man presents with burning epigastric pain that is relieved by eating. He is a heavy smoker. The most likely diagnosis is:","options":["Gastric carcinoma","Duodenal ulcer","Acute appendicitis","Crohn's disease"],"answer":1,"explanation":"Epigastric pain that is burning in nature and relieved by the ingestion of food is a classic clinical presentation of a duodenal ulcer."},{"id":36,"topic":"Peptic Ulcer","question":"The most common complication of a peptic ulcer that leads to an acute surgical emergency is:","options":["Stricture formation","Iron deficiency anemia","Free perforation with peritonitis","Squamous metaplasia"],"answer":2,"explanation":"Free perforation of a peptic ulcer into the peritoneal cavity causes acute generalized peritonitis and is a major surgical emergency requiring immediate intervention."},{"id":37,"topic":"Peptic Ulcer","question":"Barrett's esophagus is a pre-malignant condition caused by:","options":["Alcohol-induced gastritis","Chronic gastro-esophageal reflux","Vitamin A deficiency","Viral infection"],"answer":1,"explanation":"Barrett's esophagus is a condition where the lower esophageal squamous epithelium undergoes intestinal glandular metaplasia due to chronic acid reflux."},{"id":38,"topic":"Peptic Ulcer","question":"Which drug is a common cause of 'pill-induced' esophagitis?","options":["Penicillin","Iron tablets","Vitamin D","Aspirin (at low doses)"],"answer":1,"explanation":"Direct toxicity to the esophageal mucosa by certain medications, such as iron tablets or bisphosphonates, causes pill esophagitis."},{"id":39,"topic":"Miscellaneous Pathology","question":"The 'Three Ds' of Pellagra (Dementia, Dermatitis, Diarrhea) result from deficiency of:","options":["Thiamine","Niacin","Riboflavin","Vitamin K"],"answer":1,"explanation":"Pellagra is the clinical syndrome resulting from niacin (Vitamin B3) deficiency and is characterized by the Three Ds: Dermatitis, Diarrhea, and Dementia."},{"id":40,"topic":"Miscellaneous Pathology","question":"A 70-year-old man who eats only tea and toast presents with bleeding gums and skin hemorrhages. This is due to impaired formation of:","options":["Heme","Collagen","Myelin","Epithelium"],"answer":1,"explanation":"Scurvy results from Vitamin C deficiency; because Vitamin C is a cofactor for hydroxylation of procollagen, its absence leads to impaired collagen cross-linking and fragile blood vessels."},{"id":41,"topic":"Miscellaneous Pathology","question":"In the context of the 'Virchow triad,' stasis of blood flow is a major contributor to:","options":["Arteriolar dilation","Venous thrombosis","Myocardial hypertrophy","Hyperemia"],"answer":1,"explanation":"Sluggish blood flow, or stasis, is a component of the Virchow triad and is a major contributor to the formation of thrombi in deep veins."},{"id":42,"topic":"Peptic Ulcer","question":"A 40-year-old male with recurrent multiple duodenal ulcers, some located in the second part of the duodenum, should be investigated for:","options":["Coeliac disease","Zollinger-Ellison syndrome","Type 1 Hypersensitivity","Hirschsprung's disease"],"answer":1,"explanation":"The presence of recurrent multiple duodenal ulcers especially located beyond the first part of the duodenum should raise clinical suspicion of Zollinger-Ellison syndrome (gastrinoma)."},{"id":43,"topic":"Anemia","question":"Which laboratory finding is characteristic of Vitamin B12 deficiency but NOT folate deficiency?","options":["High MCV","Hypersegmented neutrophils","Subacute combined degeneration of the spinal cord","Megaloblastic changes in the bone marrow"],"answer":2,"explanation":"While both B12 and folate deficiencies cause megaloblastic anemia, only Vitamin B12 deficiency is associated with degeneration of the posterolateral spinal cord tracts (subacute combined degeneration)."},{"id":44,"topic":"Miscellaneous Pathology","question":"Which enzyme deficiency causes von Gierke disease?","options":["Muscle phosphorylase","Lysosomal acid maltase","Glucose-6-phosphatase","Branching enzyme"],"answer":2,"explanation":"Von Gierke disease (Type I glycogenosis) is caused by an inherited deficiency of the hepatic enzyme glucose-6-phosphatase."},{"id":45,"topic":"Miscellaneous Pathology","question":"Which type of shock is characterized by 'warm, flushed skin' in its initial stage?","options":["Hypovolemic shock","Cardiogenic shock","Septic shock","Neurogenic shock"],"answer":2,"explanation":"While most shock states present with cool, clammy skin due to vasoconstriction, septic shock can initially cause cutaneous vasodilation resulting in warm, flushed skin."},{"id":46,"topic":"Miscellaneous Pathology","question":"A patient with end-stage renal disease on dialysis develops joint pain. Congo Red staining of the synovium shows apple-green birefringence. The deposits are:","options":["Calcium oxalate","Urate crystals","Beta2-microglobulin (amyloid)","Hemosiderin"],"answer":2,"explanation":"In patients on long-term hemodialysis, beta2-microglobulin can deposit as amyloid (Abeta2m) in and around the joints and soft tissues."},{"id":47,"topic":"Miscellaneous Pathology","question":"Metastatic calcification in the lungs or kidneys most commonly results from:","options":["Chronic inflammation","Hypercalcemia","Tissue necrosis","Vitamin C deficiency"],"answer":1,"explanation":"Metastatic calcification involves the deposition of calcium salts in normal tissues and is almost always the result of hypercalcemia."},{"id":48,"topic":"Miscellaneous Pathology","question":"A 'nutmeg liver' pattern is a classic morphologic sign of:","options":["Acute viral hepatitis","Chronic passive hepatic congestion","Hepatocellular carcinoma","Wilson's disease"],"answer":1,"explanation":"A nutmeg liver pattern is created by the contrast between red-brown congested centrilobular areas and surrounding tan viable or fatty parenchyma in chronic passive congestion."},{"id":49,"topic":"Miscellaneous Pathology","question":"Which of the following is an early sign of Vitamin A deficiency?","options":["Osteomalacia","Night blindness","Scurvy","Hypercalcemia"],"answer":1,"explanation":"Night blindness, or impaired vision in reduced light, is one of the earliest clinical signs of Vitamin A deficiency due to depletion of rhodopsin in rod cells."},{"id":50,"topic":"Peptic Ulcer","question":"A patient with a board-like rigid abdomen and history of chronic NSAID use presents with sudden severe epigastric pain. The most likely finding on an upright chest X-ray is:","options":["Pleural effusion","Free air under the diaphragm (perforation)","Cardiomegaly","Pulmonary edema"],"answer":1,"explanation":"A board-like rigid abdomen with epigastric pain in an NSAID user points to a perforated peptic ulcer, which releases gas detectable as free air under the diaphragm on an upright chest X-ray."}]}]};

let currentChapter = null;
let selectedTopics = [];
let selectedQty = 10;
let selectedMode = 'practice';
let quizQuestions = [];
let currentIdx = 0;
let score = 0;
let wrongQs = [];
let answered = [];
let timerInterval = null;
let timeLeft = 60;

// ── BUILD HOME ──
function buildHome(){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  BANK.chapters.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="ch-left">
        <div class="ch-num">${ch.chapter}</div>
        <div>
          <div class="ch-title">${ch.title}</div>
          <div class="ch-meta">${ch.questions.length} questions · ${ch.topics.slice(0,3).join(', ')}${ch.topics.length>3?'…':''}</div>
        </div>
      </div>
      <span class="ch-arrow">›</span>`;
    card.onclick = () => showConfig(ch);
    grid.appendChild(card);
  });
}

// ── SHOW SCREENS ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showHome(){ clearTimer(); showScreen('screen-home'); }

function showConfig(ch){
  currentChapter = ch;
  selectedTopics = [...ch.topics];
  selectedQty = 10;
  selectedMode = 'practice';

  document.getElementById('configTitle').textContent = `Chapter ${ch.chapter}: ${ch.title}`;
  document.getElementById('configSub').textContent = `${ch.questions.length} questions available across ${ch.topics.length} topics.`;

  // Topics
  const tg = document.getElementById('topicGrid');
  tg.innerHTML = '';
  ch.topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-chip selected';
    btn.textContent = t;
    btn.onclick = () => toggleTopic(btn, t);
    tg.appendChild(btn);
  });

  // Reset qty
  document.querySelectorAll('.qty-btn').forEach((b,i) => b.classList.toggle('selected', i===0));
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('selected', i===0));

  showScreen('screen-config');
}

function toggleTopic(btn, topic){
  if(selectedTopics.includes(topic)){
    if(selectedTopics.length === 1) return; // keep at least 1
    selectedTopics = selectedTopics.filter(t => t !== topic);
    btn.classList.remove('selected');
  } else {
    selectedTopics.push(topic);
    btn.classList.add('selected');
  }
}

function setQty(btn, n){
  selectedQty = n;
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function setMode(btn, mode){
  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ── START QUIZ ──
function startQuiz(pool){
  let questions = pool || currentChapter.questions.filter(q => selectedTopics.includes(q.topic));
  // Shuffle
  questions = questions.sort(() => Math.random() - 0.5);
  const qty = selectedQty === 0 ? questions.length : Math.min(selectedQty, questions.length);
  quizQuestions = questions.slice(0, qty);
  currentIdx = 0; score = 0; wrongQs = []; answered = [];
  renderQuestion();
  showScreen('screen-quiz');
}

// ── RENDER QUESTION ──
function renderQuestion(){
  clearTimer();
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;

  document.getElementById('quizChapter').textContent = `Ch${currentChapter.chapter} · General Pathology`;
  document.getElementById('quizCounter').textContent = `${currentIdx+1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIdx)/total)*100}%`;
  document.getElementById('topicTag').textContent = q.topic;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('explanationBox').classList.remove('visible');
  document.getElementById('btnNext').classList.remove('visible');

  const opts = document.getElementById('optionsWrap');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, q);
    opts.appendChild(btn);
  });

  // Timer
  const tb = document.getElementById('timerBadge');
  if(selectedMode === 'timed'){
    tb.classList.add('visible');
    tb.classList.remove('warning');
    timeLeft = 60;
    document.getElementById('timerVal').textContent = timeLeft;
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById('timerVal').textContent = timeLeft;
      if(timeLeft <= 10) tb.classList.add('warning');
      if(timeLeft <= 0){ clearTimer(); autoSkip(q); }
    }, 1000);
  } else {
    tb.classList.remove('visible');
  }
}

function clearTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }

function autoSkip(q){
  answered.push({q, chosen: -1, correct: false});
  wrongQs.push({q, chosen: -1});
  revealAnswer(q, -1);
}

function selectAnswer(chosen, q){
  clearTimer();
  const correct = chosen === q.answer;
  if(correct) score++;
  else wrongQs.push({q, chosen});
  answered.push({q, chosen, correct});
  revealAnswer(q, chosen);
}

function revealAnswer(q, chosen){
  const btns = document.querySelectorAll('.option');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if(i === q.answer) btn.classList.add(chosen === -1 ? 'reveal' : 'correct');
    else if(i === chosen) btn.classList.add('wrong');
  });
  document.getElementById('explanationText').textContent = q.explanation;
  document.getElementById('explanationBox').classList.add('visible');
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('btnNext').textContent = currentIdx < quizQuestions.length-1 ? 'Next Question →' : 'See Results →';
}

function nextQuestion(){
  currentIdx++;
  if(currentIdx < quizQuestions.length) renderQuestion();
  else showResults();
}

// ── RESULTS ──
function showResults(){
  clearTimer();
  const total = quizQuestions.length;
  const pct = Math.round((score/total)*100);
  const wrong = answered.filter(a => !a.correct).length;
  const skipped = answered.filter(a => a.chosen === -1).length;

  document.getElementById('resScore').textContent = score;
  document.getElementById('resDenom').textContent = `out of ${total}`;
  document.getElementById('resPct').textContent = `${pct}%`;
  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resWrong').textContent = wrong - skipped;
  document.getElementById('resSkipped').textContent = skipped;

  const bar = document.getElementById('resBar');
  bar.style.width = '0%';
  bar.style.background = pct >= 70 ? 'var(--teal)' : pct >= 50 ? 'var(--amber-mid)' : '#EF4444';
  setTimeout(() => bar.style.width = pct+'%', 100);

  let msg = pct >= 80 ? '🎉 Excellent! Viva-ready.' : pct >= 60 ? '👍 Good effort — review the wrong ones.' : '📚 Keep revising — you can do this!';
  document.getElementById('resMsg').textContent = msg;
  document.getElementById('resPct').style.color = pct >= 70 ? 'var(--teal)' : pct >= 50 ? 'var(--amber)' : '#EF4444';

  // Review
  const list = document.getElementById('reviewList');
  list.innerHTML = '<div style="font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;">Review All Questions</div>';
  answered.forEach((a, idx) => {
    const div = document.createElement('div');
    div.className = `review-item ${a.correct ? 'correct' : 'wrong'}`;
    const letters = ['A','B','C','D'];
    const yourAns = a.chosen === -1 ? 'Skipped' : `${letters[a.chosen]}. ${a.q.options[a.chosen]}`;
    const corrAns = `${letters[a.q.answer]}. ${a.q.options[a.q.answer]}`;
    div.innerHTML = `
      <div class="review-q">${idx+1}. ${a.q.question}</div>
      ${!a.correct ? `<div class="review-ans w">✗ Your answer: ${yourAns}</div>` : ''}
      <div class="review-ans c">✓ Correct: ${corrAns}</div>
      <div class="review-exp">${a.q.explanation}</div>`;
    list.appendChild(div);
  });

  showScreen('screen-results');
}

function retryQuiz(){ currentIdx=0; score=0; wrongQs=[]; answered=[]; startQuiz(quizQuestions); }
function retryWrong(){
  if(!wrongQs.length){ alert('No wrong answers to retry!'); return; }
  const pool = wrongQs.map(w => w.q);
  currentIdx=0; score=0; wrongQs=[]; answered=[]; startQuiz(pool);
}

buildHome();
</script>
</body>
</html>
