<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0F6E56;--teal-light:#1D9E75;--teal-mid:#5DCAA5;--teal-pale:#E1F5EE;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-mid:#EF9F27;
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-bdr:#97C459;
  --red-bg:#FEE2E2;--red-text:#991B1B;--red-bdr:#FCA5A5;
  --ink:#1a1a1a;--muted:#6b7280;--surface:#f9f7f4;--white:#fff;
  --border:rgba(15,110,86,0.13);
  --shadow:0 4px 24px rgba(15,110,86,0.10);
  --radius:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--teal);color:white;padding:1.5rem 2rem;display:flex;align-items:center;gap:12px}
.header-logo{font-family:'DM Serif Display',serif;font-size:1.5rem}
.header-sub{font-size:0.85rem;opacity:0.8;margin-top:2px}

/* ── SCREENS ── */
.screen{display:none;max-width:860px;margin:0 auto;padding:2rem 1.5rem}
.screen.active{display:block}

/* ── HOME ── */
.welcome-title{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--ink);margin:1.5rem 0 0.5rem}
.welcome-sub{color:var(--muted);margin-bottom:2rem;line-height:1.7}
.stats-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem}
.stat-box{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;text-align:center;flex:1;min-width:120px}
.stat-num{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--teal);display:block}
.stat-lbl{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.chapter-grid{display:flex;flex-direction:column;gap:0.75rem}
.chapter-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.2s}
.chapter-card:hover{border-color:var(--teal-mid);background:var(--teal-pale);transform:translateX(4px)}
.ch-left{display:flex;align-items:center;gap:12px}
.ch-num{width:36px;height:36px;border-radius:8px;background:var(--teal-pale);color:var(--teal);font-family:'DM Serif Display',serif;font-size:1.1rem;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.ch-title{font-size:0.9rem;font-weight:600;color:var(--ink)}
.ch-meta{font-size:0.75rem;color:var(--muted);margin-top:2px}
.ch-arrow{color:var(--teal-mid);font-size:1.2rem}

/* ── CONFIG ── */
.config-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin:1.5rem 0 0.4rem}
.config-sub{color:var(--muted);font-size:0.9rem;margin-bottom:1.75rem}
.config-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.config-card label{display:block;font-size:0.82rem;font-weight:600;color:var(--ink);margin-bottom:0.6rem}
.topic-grid{display:flex;flex-wrap:wrap;gap:0.5rem}
.topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.18s;color:var(--muted)}
.topic-chip.selected{background:var(--teal-pale);border-color:var(--teal);color:var(--teal);font-weight:600}
.qty-row{display:flex;gap:0.5rem;flex-wrap:wrap}
.qty-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 18px;font-size:0.85rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.18s}
.qty-btn.selected{background:var(--teal-pale);border-color:var(--teal);color:var(--teal);font-weight:600}
.mode-row{display:flex;gap:0.5rem}
.mode-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.18s;text-align:center}
.mode-btn.selected{background:var(--teal-pale);border-color:var(--teal);color:var(--teal);font-weight:600}
.btn-start{width:100%;background:var(--teal);color:white;border:none;border-radius:999px;padding:14px;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:1rem;transition:background 0.2s}
.btn-start:hover{background:var(--teal-light)}
.btn-back{background:none;border:none;color:var(--teal);font-size:0.875rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;margin-bottom:1rem;padding:0}

/* ── QUIZ ── */
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.quiz-chapter{font-size:0.78rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--teal)}
.quiz-counter{font-size:0.85rem;color:var(--muted);font-weight:500}
.progress-bar{height:5px;background:var(--border);border-radius:999px;margin-bottom:1.75rem;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:999px;transition:width 0.4s ease}
.topic-tag{display:inline-flex;background:var(--amber-light);color:var(--amber);border:1px solid rgba(186,117,23,0.2);border-radius:999px;padding:3px 12px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1rem}
.question-text{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--ink);line-height:1.5;margin-bottom:1.75rem}
.options{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem}
.option{display:flex;align-items:flex-start;gap:12px;background:white;border:2px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;cursor:pointer;transition:all 0.18s;text-align:left;font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--ink)}
.option:hover:not(:disabled){border-color:var(--teal-mid);background:var(--teal-pale)}
.option.correct{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green-text)}
.option.wrong{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red-text)}
.option.reveal{background:var(--green-bg);border-color:var(--green-bdr);color:var(--green-text)}
.option:disabled{cursor:default}
.opt-letter{width:26px;height:26px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;margin-top:1px}
.option.correct .opt-letter{background:var(--green-text);color:white;border-color:var(--green-text)}
.option.wrong .opt-letter{background:var(--red-text);color:white;border-color:var(--red-text)}
.option.reveal .opt-letter{background:var(--green-text);color:white;border-color:var(--green-text)}
.explanation{background:white;border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:0.88rem;color:var(--ink);line-height:1.7;display:none}
.explanation.visible{display:block}
.explanation strong{color:var(--teal);display:block;margin-bottom:4px;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em}
.quiz-actions{display:flex;gap:0.75rem}
.btn-next{flex:1;background:var(--teal);color:white;border:none;border-radius:999px;padding:13px;font-size:0.95rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background 0.2s;display:none}
.btn-next.visible{display:block}
.btn-next:hover{background:var(--teal-light)}
.timer-badge{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid);border-radius:999px;padding:4px 14px;font-size:0.82rem;font-weight:700;display:none}
.timer-badge.visible{display:inline-flex;align-items:center;gap:6px}
.timer-badge.warning{background:var(--red-bg);color:var(--red-text);border-color:var(--red-bdr)}

/* ── RESULTS ── */
.result-hero{text-align:center;background:white;border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;margin:1.5rem 0}
.result-score{font-family:'DM Serif Display',serif;font-size:4rem;color:var(--teal);line-height:1}
.result-denom{font-size:1.2rem;color:var(--muted);margin-top:4px}
.result-pct{font-size:1.1rem;font-weight:600;margin-top:0.5rem}
.result-msg{font-size:0.95rem;color:var(--muted);margin-top:0.5rem}
.result-bar-wrap{height:10px;background:var(--border);border-radius:999px;margin:1.25rem 0;overflow:hidden}
.result-bar{height:100%;border-radius:999px;transition:width 1s ease}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:1.5rem}
.res-stat{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;text-align:center}
.res-stat-num{font-family:'DM Serif Display',serif;font-size:1.75rem;display:block}
.res-stat-lbl{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.res-actions{display:flex;gap:0.75rem;flex-wrap:wrap}
.btn-outline{flex:1;background:white;color:var(--teal);border:2px solid var(--teal);border-radius:999px;padding:12px;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;min-width:140px}
.btn-outline:hover{background:var(--teal-pale)}
.review-list{display:flex;flex-direction:column;gap:0.75rem;margin-top:1.5rem}
.review-item{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;border-left:4px solid var(--border)}
.review-item.correct{border-left-color:var(--green-text)}
.review-item.wrong{border-left-color:var(--red-text)}
.review-q{font-size:0.88rem;font-weight:500;color:var(--ink);margin-bottom:6px}
.review-ans{font-size:0.8rem;margin-top:4px}
.review-ans.c{color:var(--green-text)}
.review-ans.w{color:var(--red-text)}
.review-exp{font-size:0.78rem;color:var(--muted);margin-top:6px;line-height:1.6}

@media(max-width:600px){
  .screen{padding:1.25rem 1rem}
  .stats-row{gap:0.5rem}
  .result-grid{grid-template-columns:1fr 1fr}
  .question-text{font-size:1.1rem}
}
</style>

<script>
const BANK = {"subject":"General Pathology","total":400,"chapters":[{"chapter":1,"title":"Cellular Responses to Stress and Toxic Insults","topics":["Adaptation","Cell Injury","Necrosis","Apoptosis","Intracellular Accumulations","Pathological Calcification"],"questions":[{"id":1,"topic":"Adaptation","question":"Which of the following is an active process caused by arteriolar dilation, resulting in erythema?","options":["Congestion","Hyperemia","Edema","Thrombosis"],"answer":1,"explanation":"Hyperemia is an active process resulting from arteriolar dilation, which increases blood flow and turns the tissue red (erythema)."},{"id":2,"topic":"Adaptation","question":"In response to an increased workload, such as hypertension, the heart muscle increases in size. This cellular adaptation is termed:","options":["Hyperplasia","Metaplasia","Hypertrophy","Dysplasia"],"answer":2,"explanation":"Hypertrophy refers to an increase in the size of cells, resulting in an increase in the size of the organ, often in response to increased workload."},{"id":3,"topic":"Adaptation","question":"The replacement of one adult cell type by another adult cell type to withstand a specific stress is known as:","options":["Anaplasia","Metaplasia","Atrophy","Hyperplasia"],"answer":1,"explanation":"Metaplasia is a reversible change in which one differentiated cell type is replaced by another cell type better able to withstand the stress."},{"id":4,"topic":"Adaptation","question":"Which adaptation occurs in the uterus during pregnancy due to hormonal stimulation?","options":["Atrophy only","Hypertrophy and Hyperplasia","Metaplasia only","Aplasia"],"answer":1,"explanation":"During pregnancy, the uterus undergoes massive physiological enlargement due to both hypertrophy (increase in cell size) and hyperplasia (increase in cell number) in response to estrogen."},{"id":5,"topic":"Adaptation","question":"A 60-year-old chronic smoker undergoes a bronchial biopsy. The pathology report indicates the normal ciliated columnar epithelium has been replaced by stratified squamous epithelium. This is an example of:","options":["Malignant transformation","Squamous Metaplasia","Hyperplasia","Atypia"],"answer":1,"explanation":"In the lungs of a chronic smoker, the normal ciliated columnar epithelial cells are often replaced by stratified squamous epithelial cells to withstand chronic irritation \u2014 this is squamous metaplasia."},{"id":6,"topic":"Cell Injury","question":"The earliest morphologic manifestation of almost all forms of injury to cells is:","options":["Necrosis","Cellular swelling","Fatty change","Pyknosis"],"answer":1,"explanation":"Cellular swelling is the earliest manifestation of almost all forms of injury to cells, appearing when cells are unable to maintain ionic and fluid homeostasis."},{"id":7,"topic":"Cell Injury","question":"Reversible injury is consistently characterized by:","options":["Rupture of the plasma membrane","Loss of nuclei","Generalized swelling of the cell and its organelles","Karyolysis"],"answer":2,"explanation":"Reversible cell injury is consistently characterized by cellular swelling, plasma membrane blebbing, and clumping of nuclear chromatin."},{"id":8,"topic":"Cell Injury","question":"In the liver, toxic injury disrupts metabolic pathways leading to the accumulation of triglycerides. This is known as:","options":["Steatosis","Hyaline change","Calcification","Amyloidosis"],"answer":0,"explanation":"Steatosis (fatty change) refers to the accumulation of triglycerides in cells, typically occurring in organs involved in lipid metabolism, such as the liver."},{"id":9,"topic":"Cell Injury","question":"Which of the following is the most common cause of cell injury in clinical medicine?","options":["Chemical toxins","Genetic defects","Hypoxia resulting from ischemia","Nutritional imbalances"],"answer":2,"explanation":"Ischemia, which is reduced blood flow, is the most common cause of hypoxia and cell injury in clinical medicine."},{"id":10,"topic":"Cell Injury","question":"Unmistakable light microscopic evidence of cell death generally does not appear until how many hours after the onset of severe ischemia?","options":["5 minutes","30 minutes","1 to 2 hours","4 to 12 hours"],"answer":3,"explanation":"While cell death (necrosis) may occur quickly, the light microscopic evidence of that death generally does not appear for 4 to 12 hours."},{"id":11,"topic":"Cell Injury","question":"Which mechanism is primarily responsible for cell swelling during hypoxia?","options":["Increased protein synthesis","Failure of the ATP-dependent Na+-K+ pump","Activation of endonucleases","Leakage of cytochrome c"],"answer":1,"explanation":"During hypoxia, the depletion of ATP leads to the failure of the sodium pump, causing an influx of sodium and water into the cell, resulting in swelling."},{"id":12,"topic":"Cell Injury","question":"The 'point of no return' in cell injury is characterized by the inability to reverse:","options":["Mitochondrial dysfunction","Ribosome detachment","Chromatin clumping","Membrane blebbing"],"answer":0,"explanation":"Irreversibility is consistently characterized by two phenomena: the inability to reverse mitochondrial dysfunction and profound disturbances in membrane function."},{"id":13,"topic":"Necrosis","question":"A patient presents with a large, yellowish-white, 'cheesy' area of necrosis in the lung. This pattern is characteristic of:","options":["Coagulative necrosis","Caseous necrosis","Liquefactive necrosis","Fat necrosis"],"answer":1,"explanation":"Caseous necrosis is a form of necrosis encountered in tuberculous infection; it is characterized by a 'cheesy,' friable yellow-white appearance."},{"id":14,"topic":"Necrosis","question":"Necrosis of the brain usually manifests as which of the following patterns?","options":["Coagulative necrosis","Fibrinoid necrosis","Liquefactive necrosis","Caseous necrosis"],"answer":2,"explanation":"Hypoxic death of cells within the central nervous system (brain) typically manifests as liquefactive necrosis, resulting in transformation of tissue into a viscous liquid."},{"id":15,"topic":"Necrosis","question":"Which type of necrosis is most commonly associated with focal bacterial or fungal infections?","options":["Fat necrosis","Liquefactive necrosis","Gangrenous necrosis","Fibrinoid necrosis"],"answer":1,"explanation":"Liquefactive necrosis is characteristic of focal bacterial or occasionally fungal infections, where microbes stimulate the accumulation of inflammatory cells."},{"id":16,"topic":"Necrosis","question":"During an abdominal emergency, a surgeon finds chalky-white areas in the mesentery. This indicates:","options":["Saponification in fat necrosis","Fibrinous inflammation","Metastatic calcification","Gangrene"],"answer":0,"explanation":"Fat necrosis involves the release of pancreatic lipases, which split triglycerides into fatty acids that combine with calcium to produce chalky-white areas (saponification)."},{"id":17,"topic":"Necrosis","question":"Fibrinoid necrosis is typically observed in:","options":["Tuberculosis granulomas","Myocardial infarction","Immune reactions involving blood vessels","Brain abscesses"],"answer":2,"explanation":"Fibrinoid necrosis is a special form of vascular damage seen in immune reactions where complexes of antigens and antibodies are deposited in the walls of arteries."},{"id":18,"topic":"Apoptosis","question":"The primary characteristic of apoptosis that distinguishes it from necrosis is:","options":["Induction of a massive inflammatory response","Cell swelling","Lack of an inflammatory reaction","Disruption of the plasma membrane early in the process"],"answer":2,"explanation":"Unlike necrosis, apoptosis does not elicit an inflammatory response because the cell is broken into fragments (apoptotic bodies) that are consumed by phagocytes before their contents can leak."},{"id":19,"topic":"Apoptosis","question":"Which enzymes are the 'executioners' of the apoptotic program?","options":["Phospholipases","Caspases","Proteasomes","ATPases"],"answer":1,"explanation":"Apoptosis results from the activation of enzymes called caspases, which exist as inactive proenzymes and must be cleaved to become active executioners."},{"id":20,"topic":"Apoptosis","question":"The intrinsic (mitochondrial) pathway of apoptosis is triggered by the release of which protein into the cytosol?","options":["Endothelin","Cytochrome c","Fibrinogen","Troponin"],"answer":1,"explanation":"The intrinsic (mitochondrial) pathway of apoptosis is triggered by the release of pro-apoptotic molecules, such as cytochrome c, from the mitochondrial membrane into the cytosol."},{"id":21,"topic":"Apoptosis","question":"Anti-apoptotic members of the BCL2 family, such as BCL2 and BCL-XL, function by:","options":["Activating BAX and BAK","Permeabilizing the mitochondrial membrane","Preventing the leakage of cytochrome c into the cytosol","Directly activating Caspase-8"],"answer":2,"explanation":"Anti-apoptotic proteins like BCL2 and BCL-XL reside in the outer mitochondrial membrane and keep it impermeable to cytochrome c."},{"id":22,"topic":"Intracellular Accumulations","question":"The 'wear-and-tear' pigment that accumulates in the heart and liver of aging patients is:","options":["Melanin","Hemosiderin","Lipofuscin","Bilirubin"],"answer":2,"explanation":"Lipofuscin, known as 'wear-and-tear' pigment, is an insoluble yellow-brown pigment that accumulates in the heart and liver of aging or malnourished patients."},{"id":23,"topic":"Intracellular Accumulations","question":"Hemosiderin represents aggregates of which protein?","options":["Albumin","Ferritin","Fibrin","Keratin"],"answer":1,"explanation":"Hemosiderin is a golden-brown pigment that represents large aggregates of ferritin micelles."},{"id":24,"topic":"Pathological Calcification","question":"Dystrophic calcification occurs in:","options":["Normal tissues with high serum calcium","Necrotic or dying tissues with normal serum calcium","The gastric mucosa during hyperparathyroidism","Tissues with high alkaline pH"],"answer":1,"explanation":"Dystrophic calcification occurs locally in dying tissues despite normal serum levels of calcium and no derangements in calcium metabolism."},{"id":25,"topic":"Pathological Calcification","question":"Which of the following is a cause of metastatic calcification?","options":["Advanced atherosclerosis","Chronic tuberculosis","Hyperparathyroidism","Infarction of the spleen"],"answer":2,"explanation":"Metastatic calcification results from hypercalcemia, which can be caused by increased secretion of parathyroid hormone (hyperparathyroidism)."},{"id":26,"topic":"Cell Injury","question":"Which transcription factor is the most important for the synthesis and deposition of connective tissue proteins (fibrosis)?","options":["MYC","TGF-\u03b2","NF-\u03baB","HIF-1\u03b1"],"answer":1,"explanation":"TGF-\u03b2 is the most important cytokine for the synthesis and deposition of connective tissue proteins (fibrosis) in repair and chronic inflammation."},{"id":27,"topic":"Intracellular Accumulations","question":"A 55-year-old male with a history of alcohol abuse presents with an enlarged liver. Biopsy shows clear vacuoles within the hepatocytes that push the nuclei to the periphery. This indicates:","options":["Hydropic change","Steatosis","Apoptosis","Amyloidosis"],"answer":1,"explanation":"In the liver of alcoholics, toxic injury disrupts metabolism and leads to the accumulation of triglyceride-filled lipid vacuoles (steatosis), pushing nuclei to the periphery."},{"id":28,"topic":"Necrosis","question":"Karyorrhexis is defined as:","options":["Fading of nuclear basophilia","Fragmentation of a pyknotic nucleus","Nuclear shrinkage","Total disappearance of the nucleus"],"answer":1,"explanation":"Karyorrhexis is a nuclear change in necrosis where the shrunken, pyknotic nucleus undergoes fragmentation."},{"id":29,"topic":"Intracellular Accumulations","question":"Which of the following are known as 'heart failure cells' in the lung?","options":["Neutrophils in alveoli","Hemosiderin-laden macrophages","Eosinophils in septa","Fibroblasts in the pleura"],"answer":1,"explanation":"In chronic pulmonary congestion (often due to heart failure), alveolar macrophages ingest red cells and become laden with hemosiderin, known as 'heart failure cells'."},{"id":30,"topic":"Intracellular Accumulations","question":"A 'nutmeg liver' is a gross morphologic consequence of:","options":["Acute hepatitis","Chronic passive hepatic congestion","Biliary obstruction","Hepatocellular carcinoma"],"answer":1,"explanation":"Chronic passive hepatic congestion causes centrilobular congestion and hemorrhage, creating the 'nutmeg liver' pattern."},{"id":31,"topic":"Cell Injury","question":"The major mechanism of DNA damage by ionizing radiation is the generation of:","options":["Pyrimidine dimers","Reactive oxygen species (ROS) from water","ATP depletion","Cholesterol crystals"],"answer":1,"explanation":"Ionizing radiation damages DNA primarily by hydrolyzing water into hydroxyl (OH) free radicals, which then attack the DNA."},{"id":32,"topic":"Cell Injury","question":"Receptor-mediated endocytosis of LDL is primarily regulated by which liver-secreted protein that promotes receptor degradation?","options":["Albumin","PCSK9","Vimentin","Fibrillin-1"],"answer":1,"explanation":"PCSK9 is a liver-secreted enzyme that reduces the expression of LDL receptors by promoting their degradation in lysosomes."},{"id":33,"topic":"Intracellular Accumulations","question":"A child is found to have radiodense 'lines' in the epiphyses of long bones. This is a classic sign of:","options":["Vitamin D deficiency","Lead poisoning","Scurvy","Rickets"],"answer":1,"explanation":"Excess lead interferes with bone remodeling in children, causing radiodense 'lead lines' in the epiphyses of long bones."},{"id":34,"topic":"Adaptation","question":"What is the hallmark of the 'Late-Phase Reaction' in Type I Hypersensitivity?","options":["Vasodilation and edema","Tissue destruction and eosinophil infiltration","Clot stabilization","Massive collagen deposition"],"answer":1,"explanation":"The late-phase reaction in Type I hypersensitivity (2\u201324 hours later) is characterized by an inflammatory infiltrate rich in eosinophils and neutrophils causing tissue destruction."},{"id":35,"topic":"Cell Injury","question":"The presence of 'Lines of Zahn' within a blood clot indicates that:","options":["It is a postmortem clot","It formed in a stagnant, non-flowing area","It formed in flowing blood before death","It is composed entirely of red blood cells"],"answer":2,"explanation":"Lines of Zahn (alternating pale platelet/fibrin layers and dark red cell layers) signify that a thrombus formed in flowing blood, distinguishing it from a postmortem clot."},{"id":36,"topic":"Cell Injury","question":"Which cellular target is most sensitive to the effects of ischemia?","options":["Skeletal muscle","Fibroblasts","Neurons","Epidermis"],"answer":2,"explanation":"Neurons are the most vulnerable cells to hypoxia, suffering irreversible damage after only 3 to 4 minutes of oxygen deprivation."},{"id":37,"topic":"Adaptation","question":"A 45-year-old woman undergoes surgery for a breast mass. The pathology report describes the cells as having large, hyperchromatic nuclei, loss of polarity, and numerous atypical mitoses. This description fits:","options":["Dysplasia","Metaplasia","Anaplasia","Hypertrophy"],"answer":2,"explanation":"Anaplasia is defined by a lack of differentiation, marked pleomorphism, hyperchromatic large nuclei, and atypical mitoses."},{"id":38,"topic":"Apoptosis","question":"In the extrinsic pathway of apoptosis, the Fas ligand (FasL) binds to Fas to eventually activate:","options":["Caspase-9","Caspase-8","Myeloperoxidase","Glucocerebrosidase"],"answer":1,"explanation":"In the extrinsic (death receptor) pathway of apoptosis, engagement of the Fas receptor leads to the activation of initiator Caspase-8."},{"id":39,"topic":"Adaptation","question":"Which autosomal dominant disorder is caused by a defect in fibrillin-1?","options":["Ehlers-Danlos Syndrome","Marfan Syndrome","Familial Hypercholesterolemia","Tay-Sachs Disease"],"answer":1,"explanation":"Marfan syndrome is an autosomal dominant disorder caused by a defect in fibrillin-1, a glycoprotein essential for connective tissue structural integrity."},{"id":40,"topic":"Intracellular Accumulations","question":"'Crumpled tissue paper' appearance of macrophage cytoplasm is a diagnostic clue for:","options":["Niemann-Pick Disease","Gaucher Disease","Hurler Syndrome","Pompe Disease"],"answer":1,"explanation":"Gaucher cells are plump macrophages that characteristically have a cytoplasm resembling 'crumpled tissue paper' due to glucocerebroside accumulation."},{"id":41,"topic":"Necrosis","question":"A localized area of coagulative necrosis resulting from vascular occlusion is called:","options":["An abscess","An infarct","A thrombus","A granuloma"],"answer":1,"explanation":"An infarct is a localized area of ischemic necrosis, most commonly caused by arterial occlusion."},{"id":42,"topic":"Necrosis","question":"Red (hemorrhagic) infarcts are most commonly found in which of the following?","options":["Spleen","Kidney","Lung","Heart"],"answer":2,"explanation":"Red (hemorrhagic) infarcts occur in loose, spongy tissues (like the lung) or in organs with dual circulations."},{"id":43,"topic":"Adaptation","question":"Metaplasia of the esophageal squamous epithelium to intestinal-like columnar cells is known as:","options":["Barrett esophagus","Squamous cell carcinoma","Achalasia","Esophagitis"],"answer":0,"explanation":"Barrett esophagus occurs when the squamous epithelium of the esophagus is replaced by intestinal-like columnar cells as an adaptation to chronic acid reflux."},{"id":44,"topic":"Intracellular Accumulations","question":"Which enzyme deficiency causes von Gierke disease (Type I Glycogenosis)?","options":["Muscle phosphorylase","Lysosomal acid maltase","Glucose-6-phosphatase","Branching enzyme"],"answer":2,"explanation":"von Gierke disease (Type I glycogenosis) is caused by an inherited deficiency of hepatic glucose-6-phosphatase."},{"id":45,"topic":"Cell Injury","question":"In the context of hemodynamic shock, the 'Irreversible Stage' is characterized by:","options":["Tachycardia and peripheral vasoconstriction","Widespread cell injury and lysosomal enzyme leakage","Lactic acidosis with compensation","Warm, flushed skin"],"answer":1,"explanation":"The irreversible stage of shock is marked by severe cellular injury and the leakage of lysosomal enzymes, making survival impossible."},{"id":46,"topic":"Necrosis","question":"A 70-year-old man with long-standing atherosclerosis of the carotid arteries dies of a stroke. Autopsy reveals a wedge-shaped area of soft, liquefied tissue in the cerebral cortex. This is an example of:","options":["Coagulative necrosis","Liquefactive necrosis following infarction","Caseous necrosis","Fat necrosis"],"answer":1,"explanation":"While most organ infarcts result in coagulative necrosis, infarction in the brain results in liquefactive necrosis."},{"id":47,"topic":"Cell Injury","question":"A 25-year-old male with a massive leg fracture develops sudden respiratory distress, neurologic symptoms, and a petechial rash 48 hours after the injury. The most likely diagnosis is:","options":["Pulmonary Embolism (DVT)","Fat Embolism Syndrome","Septic Shock","Air Embolism"],"answer":1,"explanation":"Symptomatic fat embolism (usually after fractures) presents with pulmonary insufficiency, neurologic symptoms, and a petechial rash 1 to 3 days after injury."},{"id":48,"topic":"Intracellular Accumulations","question":"A patient with end-stage renal disease on long-term hemodialysis develops joint pain. Biopsy shows deposits of a fibrillar protein staining with Congo red and apple-green birefringence. This protein is likely:","options":["Amyloid Light Chain (AL)","\u03b22-microglobulin (A\u03b22m)","Transthyretin (ATTR)","Serum Amyloid Associated (AA)"],"answer":1,"explanation":"Patients on long-term hemodialysis can develop amyloidosis due to the deposition of \u03b22-microglobulin (A\u03b22m) in joints and soft tissues."},{"id":49,"topic":"Necrosis","question":"A 50-year-old woman with chronic gallstones presents with severe epigastric pain and elevated amylase/lipase. The fat around her pancreas appears chalky-white. The mechanism of this change is:","options":["Dystrophic calcification in necrotic fat","Metastatic calcification due to hypercalcemia","Release of pancreatic lipases splitting triglycerides into fatty acids that bind calcium","Atrophy of the pancreatic acini"],"answer":2,"explanation":"In acute pancreatitis, activated lipases liquefy fat cell membranes and split triglyceride esters into fatty acids that bind calcium (saponification), forming chalky-white deposits."},{"id":50,"topic":"Intracellular Accumulations","question":"An autopsy of a patient with chronic mitral valve stenosis reveals a firm, brown-colored liver with a 'nutmeg' appearance. The brown pigment in the liver cells is most likely:","options":["Melanin","Bilirubin","Hemosiderin","Lipofuscin"],"answer":2,"explanation":"In chronic congestion (nutmeg liver), the brown color in the central areas is due to the presence of hemosiderin-laden macrophages."}]},{"chapter":2,"title":"Inflammation and Repair","topics":["Acute Inflammation","Vascular Changes","Leukocyte Recruitment","Chemical Mediators","Chronic Inflammation","Granulomatous Inflammation","Tissue Repair","Wound Healing"],"questions":[{"id":1,"topic":"Acute Inflammation","question":"Which Roman writer first listed the four cardinal signs of inflammation: rubor, tumor, calor, and dolor?","options":["Virchow","Celsus","Hunter","Metchnikoff"],"answer":1,"explanation":"Celsus described rubor (redness), tumor (swelling), calor (heat), and dolor (pain) in the first century AD."},{"id":2,"topic":"Acute Inflammation","question":"Which of the following is a protective response intended to rid the host of the initial cause of cell injury and the consequences of such injury?","options":["Hyperplasia","Neoplasia","Inflammation","Necrosis"],"answer":2,"explanation":"Inflammation is a protective response essential for survival to eliminate causes and consequences of injury."},{"id":3,"topic":"Acute Inflammation","question":"The term 'exudation' refers specifically to the escape of fluid, proteins, and blood cells from the vascular system into which of the following?","options":["Intracellular space","Interstitial tissue or body cavities","Lymphatic vessels only","Arteriolar lumen"],"answer":1,"explanation":"Exudation involves the escape of fluid and proteins into interstitial tissues or body cavities."},{"id":4,"topic":"Acute Inflammation","question":"A 24-year-old man presents with a small, clear fluid-filled blister on his hand after a mild thermal burn. This is an example of which morphological pattern of inflammation?","options":["Serous inflammation","Fibrinous inflammation","Purulent inflammation","Ulcerative inflammation"],"answer":0,"explanation":"Serous inflammation is characterized by the exudation of cell-poor fluid into spaces created by injury, such as skin blisters."},{"id":5,"topic":"Vascular Changes","question":"Which vascular change is responsible for the 'heat' and 'redness' observed at a site of acute inflammation?","options":["Arteriolar vasoconstriction","Decreased vascular permeability","Arteriolar vasodilation","Reduced blood viscosity"],"answer":2,"explanation":"Arteriolar vasodilation increases blood flow to the area, leading to redness (rubor) and heat (calor)."},{"id":6,"topic":"Vascular Changes","question":"An ultrafiltrate of blood plasma with low protein content and low specific gravity, produced without an increase in vascular permeability, is termed a(n):","options":["Exudate","Transudate","Pus","Effusion"],"answer":1,"explanation":"A transudate is a protein-poor fluid produced by osmotic or hydrostatic imbalance without increased vascular permeability."},{"id":7,"topic":"Leukocyte Recruitment","question":"Which cell type is the first to be recruited from the blood to the site of an acute inflammatory stimulus?","options":["Monocytes","Lymphocytes","Neutrophils","Plasma cells"],"answer":2,"explanation":"Neutrophils predominate in the early 6\u201324 hour period of acute inflammation and are the first cells recruited."},{"id":8,"topic":"Chemical Mediators","question":"The 'immediate transient response' of vascular leakage, occurring 15\u201330 minutes after injury, is primarily elicited by:","options":["Cytokines","Leukotrienes","Histamine","Complement C3b"],"answer":2,"explanation":"Histamine is the principal mediator of the immediate transient phase of increased vascular permeability."},{"id":9,"topic":"Leukocyte Recruitment","question":"Leukocyte 'rolling' along the endothelial surface is mediated by which family of adhesion molecules?","options":["Integrins","Selectins","Immunoglobulins","Cadherins"],"answer":1,"explanation":"Initial weak interactions (rolling) are mediated by L-, E-, and P-selectins on leukocytes and endothelial cells."},{"id":10,"topic":"Leukocyte Recruitment","question":"A patient's laboratory results show a defect in the CD18 beta-chain of LFA-1 and Mac-1. This individual will likely suffer from impaired:","options":["Leukocyte rolling","Leukocyte adhesion to endothelium","Phagocytosis","Chemotaxis"],"answer":1,"explanation":"CD18 beta-chains are part of integrins required for firm adhesion of leukocytes to endothelium. Deficiency causes Leukocyte Adhesion Deficiency (LAD)."},{"id":11,"topic":"Leukocyte Recruitment","question":"Which molecule, also known as CD31, is primarily involved in the transmigration (diapedesis) of leukocytes through the endothelium?","options":["ICAM-1","VCAM-1","PECAM-1","E-selectin"],"answer":2,"explanation":"PECAM-1 (CD31) facilitates the migration of leukocytes through interendothelial junctions during diapedesis."},{"id":12,"topic":"Leukocyte Recruitment","question":"The process of locomotion of leukocytes along a chemical gradient is defined as:","options":["Opsonization","Diapedesis","Chemotaxis","Margination"],"answer":2,"explanation":"Chemotaxis is defined as locomotion of leukocytes oriented along a chemical gradient toward the site of injury."},{"id":13,"topic":"Leukocyte Recruitment","question":"Which of the following is considered a potent exogenous chemoattractant for neutrophils?","options":["Interleukin-8","Bacterial products with N-formylmethionine","Complement C5a","Leukotriene B4"],"answer":1,"explanation":"Bacterial products containing N-formylmethionine terminal amino acids are common exogenous chemoattractants for neutrophils."},{"id":14,"topic":"Leukocyte Recruitment","question":"Phagocytosis is greatly enhanced when microbes are coated with:","options":["Histamine","Opsonins","Selectins","Prostaglandins"],"answer":1,"explanation":"Opsonins (major ones: IgG antibodies and C3b fragment) coat microbes and enhance phagocytosis by providing receptors for leukocyte binding."},{"id":15,"topic":"Leukocyte Recruitment","question":"The 'respiratory burst' in activated neutrophils refers to the rapid production of:","options":["ATP","Nitric oxide","Reactive oxygen species (ROS)","Lysosomal enzymes"],"answer":2,"explanation":"The respiratory burst involves NADPH oxidase-mediated production of superoxide and other reactive oxygen species to kill microbes."},{"id":16,"topic":"Leukocyte Recruitment","question":"A 10-year-old boy presents with recurrent bacterial infections. Testing reveals a deficiency in NADPH oxidase. This child likely has:","options":["Ch\u00e9diak-Higashi syndrome","Chronic granulomatous disease","X-linked agammaglobulinemia","Complement C3 deficiency"],"answer":1,"explanation":"Chronic granulomatous disease results from inherited defects in genes encoding components of NADPH oxidase, impairing the respiratory burst."},{"id":17,"topic":"Leukocyte Recruitment","question":"Which extracellular structure, composed of nuclear chromatin and granule proteins, is produced by neutrophils to trap and kill microbes?","options":["Phagolysosome","Autophagosome","Neutrophil extracellular trap (NET)","Myelin figure"],"answer":2,"explanation":"NETs are fibrillar networks of chromatin and antimicrobial proteins extruded by neutrophils to trap and concentrate antimicrobial substances."},{"id":18,"topic":"Chemical Mediators","question":"The primary vasoactive amine stored in mast cell granules is:","options":["Serotonin","Dopamine","Histamine","Epinephrine"],"answer":2,"explanation":"Histamine is the first and primary mediator released from mast cell granules during inflammation, causing vasodilation and increased permeability."},{"id":19,"topic":"Chemical Mediators","question":"Which arachidonic acid metabolites are known to cause intense vasoconstriction and bronchospasm?","options":["Prostaglandins E2 and D2","Leukotrienes C4, D4, and E4","Lipoxins A4 and B4","Thromboxane A2"],"answer":1,"explanation":"Leukotrienes C4, D4, and E4 (cysteinyl leukotrienes) are potent spasmogenic agents causing vasoconstriction and bronchospasm."},{"id":20,"topic":"Chemical Mediators","question":"A 45-year-old woman with rheumatoid arthritis is treated with a TNF antagonist. She must be screened for latent tuberculosis because TNF is essential for:","options":["Neutrophil rolling","Maintaining the integrity of granulomas","Producing IgE antibodies","Activating the classical complement pathway"],"answer":1,"explanation":"TNF is crucial for sequestering mycobacteria within granulomas. TNF antagonists can cause reactivation of latent tuberculosis."},{"id":21,"topic":"Chemical Mediators","question":"The most abundant complement protein, whose cleavage is the critical step in all pathways of complement activation, is:","options":["C1","C3","C5","C9"],"answer":1,"explanation":"Proteolysis of C3 is the critical step common to all three complement pathways (classical, alternative, and lectin)."},{"id":22,"topic":"Acute Inflammation","question":"Which morphological pattern of inflammation is characterized by an eosinophilic meshwork of threads in body cavities like the pericardium?","options":["Serous","Fibrinous","Purulent","Ulcerative"],"answer":1,"explanation":"Fibrinous inflammation produces an eosinophilic meshwork of fibrin threads in body cavity linings, as seen in fibrinous pericarditis."},{"id":23,"topic":"Acute Inflammation","question":"A localized collection of pus caused by suppuration buried in a tissue or confined space is called a(n):","options":["Ulcer","Granuloma","Abscess","Polyp"],"answer":2,"explanation":"An abscess is a localized collection of pus produced by seeding of pyogenic bacteria in a tissue or confined space."},{"id":24,"topic":"Chemical Mediators","question":"Which of the following is a systemic effect of inflammation mediated by IL-1 and TNF acting on the hypothalamus?","options":["Leukocytosis","Fever","Hypotension","Anemia"],"answer":1,"explanation":"Cytokines TNF and IL-1 (endogenous pyrogens) stimulate prostaglandin E2 production in the hypothalamus, raising the body temperature set point."},{"id":25,"topic":"Chronic Inflammation","question":"Chronic inflammation is characterized by all of the following EXCEPT:","options":["Infiltration with mononuclear cells","Tissue destruction","Predominantly neutrophilic infiltrate","Attempts at healing by fibrosis"],"answer":2,"explanation":"A predominantly neutrophilic infiltrate is characteristic of acute, not chronic, inflammation. Chronic inflammation features mononuclear cells (macrophages, lymphocytes)."},{"id":26,"topic":"Chronic Inflammation","question":"Which cell type is considered the 'dominant' cell of chronic inflammation?","options":["Neutrophil","Macrophage","Eosinophil","Mast cell"],"answer":1,"explanation":"Macrophages are the dominant cells in most chronic inflammatory reactions, orchestrating tissue injury and repair."},{"id":27,"topic":"Chronic Inflammation","question":"'Alternatively activated' (M2) macrophages are primarily induced by which cytokines?","options":["IFN-\u03b3 and IL-12","IL-4 and IL-13","TNF and IL-1","IL-6 and IL-17"],"answer":1,"explanation":"IL-4 and IL-13 (produced by T cells and mast cells) induce the M2 anti-inflammatory phenotype focused on tissue repair."},{"id":28,"topic":"Chronic Inflammation","question":"The principal function of M1 macrophages is:","options":["Tissue repair and fibrosis","Anti-inflammatory effects","Microbicidal actions and promoting inflammation","Collagen synthesis"],"answer":2,"explanation":"M1 (classically activated) macrophages are designed to kill microbes and promote inflammation through release of enzymes and ROS."},{"id":29,"topic":"Granulomatous Inflammation","question":"A 30-year-old man presents with a chronic cough and weight loss. A lung biopsy reveals areas of central caseous necrosis surrounded by epithelioid cells and Langhans giant cells. This is diagnostic of:","options":["Acute bronchopneumonia","Tuberculosis","Lung abscess","Sarcoidosis"],"answer":1,"explanation":"The described morphology \u2014 caseous necrosis surrounded by epithelioid histiocytes and Langhans giant cells \u2014 is the classic tuberculous granuloma."},{"id":30,"topic":"Chronic Inflammation","question":"Eosinophils are characteristically abundant in inflammatory reactions mediated by:","options":["IgM antibodies","IgE antibodies and parasitic infections","Fibrinous exudates","Bacterial endotoxins"],"answer":1,"explanation":"Eosinophils are characteristic of IgE-mediated immune reactions (allergies) and parasitic infections."},{"id":31,"topic":"Granulomatous Inflammation","question":"Granulomatous inflammation is a cellular attempt to:","options":["Eliminate acute bacterial infections rapidly","Contain an offending agent that is difficult to eradicate","Promote rapid epithelial regeneration","Increase vascular permeability"],"answer":1,"explanation":"Granulomas form to wall off persistent stimuli (such as mycobacteria or foreign material) that cannot be eliminated by standard acute inflammation."},{"id":32,"topic":"Tissue Repair","question":"Repair of damaged tissues occurs by two processes:","options":["Hyperplasia and Hypertrophy","Regeneration and Scarring","Inflammation and Necrosis","Exudation and Transudation"],"answer":1,"explanation":"Regeneration restores normal tissue architecture; scarring deposits connective tissue when regeneration is insufficient."},{"id":33,"topic":"Tissue Repair","question":"Tissues that are continuously being lost and replaced by maturation from stem cells are classified as:","options":["Labile tissues","Stable tissues","Permanent tissues","Quiescent tissues"],"answer":0,"explanation":"Labile tissues (e.g., skin, gut epithelium, bone marrow) are continuously cycling and readily regenerate if the stem cell pool is preserved."},{"id":34,"topic":"Tissue Repair","question":"Following a partial hepatectomy, the liver restores its mass primarily through:","options":["Formation of a large fibrous scar","Proliferation of remaining differentiated hepatocytes","Massive hypertrophy of existing cells only","Deposition of granulation tissue"],"answer":1,"explanation":"The liver has a massive capacity for compensatory hyperplasia; remaining hepatocytes proliferate to restore liver mass."},{"id":35,"topic":"Tissue Repair","question":"Which of the following is a 'permanent' tissue with minimal regenerative capacity?","options":["Bone marrow","Liver parenchyma","Cardiac muscle","Columnar epithelium of the gut"],"answer":2,"explanation":"Cardiac muscle and neurons are permanent tissues that have essentially no regenerative capacity after injury."},{"id":36,"topic":"Wound Healing","question":"The 'pink, soft, granular' tissue seen beneath the scab of a healing skin wound is called:","options":["Scar tissue","Fibrinous exudate","Granulation tissue","Caseous necrosis"],"answer":2,"explanation":"Granulation tissue is characterized by new thin-walled capillaries (angiogenesis) and proliferating fibroblasts, giving it a pink, granular appearance."},{"id":37,"topic":"Wound Healing","question":"Angiogenesis is primarily stimulated by which growth factor?","options":["TGF-\u03b2","VEGF","TNF","IL-10"],"answer":1,"explanation":"Vascular endothelial growth factor (VEGF) is the major stimulator of angiogenesis in wound healing and tumor growth."},{"id":38,"topic":"Wound Healing","question":"The most important cytokine for the synthesis and deposition of connective tissue proteins (fibrosis) is:","options":["IL-6","IFN-\u03b3","TGF-\u03b2","Histamine"],"answer":2,"explanation":"TGF-\u03b2 is the most important cytokine for fibrosis, stimulating fibroblast proliferation and collagen synthesis."},{"id":39,"topic":"Wound Healing","question":"Healing of a clean, uninfected surgical incision approximated by sutures is an example of:","options":["Healing by second intention","Healing by first intention","Granulomatous repair","Organization of an effusion"],"answer":1,"explanation":"Healing by first intention (primary union) occurs in clean, uninfected surgical incisions with approximated edges, producing minimal scarring."},{"id":40,"topic":"Wound Healing","question":"Wound contraction, which helps close large skin defects, is primarily mediated by:","options":["Neutrophils","Endothelial cells","Myofibroblasts","Macrophages"],"answer":2,"explanation":"Myofibroblasts are modified fibroblasts with contractile properties that pull wound edges together during healing."},{"id":41,"topic":"Wound Healing","question":"A 65-year-old patient with long-standing diabetes presents with a non-healing ulcer on the foot. The primary reason for impaired healing in this patient is likely:","options":["Vitamin C deficiency","Microvascular disease causing ischemia","Excessive glucocorticoid production","Lack of myofibroblasts"],"answer":1,"explanation":"Diabetic microvascular disease causes poor tissue perfusion, which is a major inhibitor of tissue repair and wound healing."},{"id":42,"topic":"Wound Healing","question":"A raised scar that grows beyond the boundaries of the original wound and does not regress is termed a:","options":["Hypertrophic scar","Keloid","Desmoid","Fibroma"],"answer":1,"explanation":"A keloid is an exuberant scar that grows beyond wound boundaries and does not regress, unlike hypertrophic scars which remain within the wound margins."},{"id":43,"topic":"Wound Healing","question":"Which enzymes are responsible for the degradation of collagen and other ECM components during scar remodeling?","options":["Caspases","Matrix metalloproteinases (MMPs)","Cyclooxygenases","Lipoxygenases"],"answer":1,"explanation":"Matrix metalloproteinases (MMPs) remodel the ECM by degrading specific components including collagen, elastin, and fibronectin."},{"id":44,"topic":"Wound Healing","question":"Which vitamin deficiency specifically inhibits collagen cross-linking and leads to scurvy?","options":["Vitamin A","Vitamin D","Vitamin C","Vitamin K"],"answer":2,"explanation":"Vitamin C (ascorbic acid) is essential for the hydroxylation of proline and lysine in procollagen, required for stable cross-linking and wound healing."},{"id":45,"topic":"Tissue Repair","question":"'Organization' in pathology refers to:","options":["The recruitment of neutrophils to a site of injury","Fibrosis developing in a tissue space occupied by an inflammatory exudate","The maturation of stem cells into differentiated progeny","The alignment of leukocytes during margination"],"answer":1,"explanation":"Organization refers to fibrosis replacing a tissue space previously occupied by an inflammatory exudate, e.g., organizing pneumonia."},{"id":46,"topic":"Tissue Repair","question":"A 50-year-old man recovers from a large myocardial infarction. Since cardiac muscle is a permanent tissue, the damaged area will be replaced by:","options":["Regenerated myocytes","A dense collagen scar","Granulomatous inflammation","Adipose tissue"],"answer":1,"explanation":"Permanent tissue injury results in scarring because cardiac myocytes cannot regenerate. The infarcted area heals as a dense collagen scar."},{"id":47,"topic":"Acute Inflammation","question":"Systemic inflammation often results in an increase in the number of immature neutrophils in the blood, a clinical finding known as:","options":["Leukopenia","Shift to the left","Erythrocytosis","Thrombocytosis"],"answer":1,"explanation":"A 'shift to the left' refers to the release of immature neutrophils (band cells) from the bone marrow during severe inflammation."},{"id":48,"topic":"Chemical Mediators","question":"Which complement component acts as a potent opsonin?","options":["C3a","C3b","C5a","C5b-9"],"answer":1,"explanation":"C3b acts as a potent opsonin, coating microbes and recognized by phagocyte C3b receptors to enhance phagocytosis."},{"id":49,"topic":"Tissue Repair","question":"In the 'seed and soil' hypothesis of metastasis, 'soil' refers to:","options":["The primary tumor microenvironment","The characteristics of the circulating tumor cells","The favorable environment of a distant organ for tumor growth","The basement membrane of the blood vessel"],"answer":2,"explanation":"In Paget's 'seed and soil' hypothesis, 'soil' refers to the favorable microenvironment of a distant organ that supports metastatic tumor growth."},{"id":50,"topic":"Acute Inflammation","question":"The 'five R's' of the inflammatory response include all of the following EXCEPT:","options":["Recognition of the injurious agent","Recruitment of leukocytes","Replacement of cells by neoplasia","Repair"],"answer":2,"explanation":"The 5 R's are Recognition, Recruitment, Removal of the agent, Regulation of the response, and Repair. Neoplasia is not part of this framework."}]},{"chapter":3,"title":"Hemodynamic Disorders, Thromboembolic Disease, and Shock","topics":["Hyperemia and Congestion","Hemostasis","Thrombosis","Embolism","Infarction","Shock"],"questions":[{"id":1,"topic":"Hyperemia and Congestion","question":"Which of the following is an active process resulting from arteriolar dilation?","options":["Congestion","Edema","Hyperemia","Effusion"],"answer":2,"explanation":"Hyperemia is an active process resulting from arteriolar dilation, which increases blood flow and turns tissues red."},{"id":2,"topic":"Hyperemia and Congestion","question":"Congested tissues often exhibit a blue-red color (cyanosis) due to:","options":["Increased delivery of oxygenated blood","Accumulation of deoxygenated hemoglobin","Presence of hemosiderin-laden neutrophils","Acute arteriolar constriction"],"answer":1,"explanation":"Congestion is a passive process resulting from reduced venous outflow. Stasis of deoxygenated hemoglobin gives tissue a blue-red color (cyanosis)."},{"id":3,"topic":"Hyperemia and Congestion","question":"In chronic passive hepatic congestion, the 'nutmeg liver' appearance is primarily caused by:","options":["Periportal fatty change and centrilobular congestion","Fibrosis of the portal triads","Diffuse hyperplasia of Kupffer cells","Ischemic necrosis of the periportal hepatocytes"],"answer":0,"explanation":"In chronic passive hepatic congestion, central areas are red and congested, while surrounding periportal areas show fatty change, creating the nutmeg liver pattern."},{"id":4,"topic":"Hyperemia and Congestion","question":"A 65-year-old patient with chronic congestive heart failure presents with a persistent cough. Microscopic examination of the lungs reveals numerous macrophages filled with golden-brown pigment. These cells are known as:","options":["Dust cells","Heart failure cells","Langhans giant cells","Foam cells"],"answer":1,"explanation":"In chronic pulmonary congestion due to heart failure, alveolar macrophages ingest leaked red cells and become laden with golden-brown hemosiderin \u2014 these are 'heart failure cells'."},{"id":5,"topic":"Hyperemia and Congestion","question":"Which of the following describes the functional state of hepatocytes in the centrilobular region during chronic congestion?","options":["They are better oxygenated than periportal cells","They are prone to ischemic necrosis due to their distal position in hepatic blood supply","They primarily undergo metaplastic changes","They are resistant to fat accumulation"],"answer":1,"explanation":"Centrilobular hepatocytes are at the end of the hepatic blood supply and are the first to suffer from hypoxia and undergo necrosis during chronic congestion."},{"id":6,"topic":"Hemostasis","question":"The initial phase of hemostasis, occurring immediately after vascular injury, is:","options":["Formation of the platelet plug","Fibrin deposition","Arteriolar vasoconstriction","Activation of the protein C receptor"],"answer":2,"explanation":"Immediately after vascular injury, neurohumoral factors (such as endothelin) induce a transient period of reflex vasoconstriction to limit blood loss."},{"id":7,"topic":"Hemostasis","question":"Primary hemostasis is defined by the formation of:","options":["An insoluble fibrin mesh","A temporary platelet plug","A stable red thrombus","A recanalized vessel"],"answer":1,"explanation":"Primary hemostasis involves platelet adhesion, activation, and aggregation to form the initial temporary primary hemostatic plug."},{"id":8,"topic":"Hemostasis","question":"During platelet adhesion, which glycoprotein receptor binds directly to von Willebrand factor (vWF)?","options":["GpIIb-IIIa","GpIb","P-selectin","Factor VIII"],"answer":1,"explanation":"Platelets adhere to exposed subendothelial extracellular matrix primarily through the binding of glycoprotein Ib (GpIb) receptors to von Willebrand factor (vWF)."},{"id":9,"topic":"Hemostasis","question":"The conversion of the initial platelet plug into a permanent secondary hemostatic plug requires:","options":["Adenosine diphosphatase","Thrombin and fibrinogen","Nitric oxide","Prostacyclin"],"answer":1,"explanation":"In secondary hemostasis, the coagulation cascade generates thrombin, which cleaves fibrinogen into insoluble fibrin, creating a mesh that cements platelets into a stable plug."},{"id":10,"topic":"Hemostasis","question":"Which molecule, synthesized by endothelial cells, acts as a potent counter-regulatory mechanism to limit clotting to the site of injury?","options":["Endothelin","Tissue plasminogen activator (t-PA)","Thromboxane A2","Collagen"],"answer":1,"explanation":"Endothelial cells produce counter-regulatory factors like t-PA (which promotes fibrinolysis) and thrombomodulin to ensure clotting remains restricted to the site of injury."},{"id":11,"topic":"Hemostasis","question":"In the laboratory, the Prothrombin Time (PT) assay specifically assesses the function of proteins in which pathway?","options":["Intrinsic","Extrinsic","Fibrinolytic","Anticoagulant"],"answer":1,"explanation":"The Prothrombin Time (PT) measures the function of proteins in the extrinsic pathway (factors VII, X, V, II, and fibrinogen)."},{"id":12,"topic":"Thrombosis","question":"The 'Virchow triad' includes all the following factors contributing to thrombosis EXCEPT:","options":["Endothelial injury","Hypercoagulability","Abnormal blood flow","Vitamin C deficiency"],"answer":3,"explanation":"The Virchow triad consists of endothelial injury, stasis or turbulence of blood flow, and hypercoagulability. Vitamin C deficiency is not part of this triad."},{"id":13,"topic":"Hemostasis","question":"Platelet aggregation is primarily mediated by the binding of fibrinogen to:","options":["GpIb","GpIIb-IIIa","vWF","Factor V"],"answer":1,"explanation":"Activated platelets change the conformation of GpIIb-IIIa receptors, allowing them to bind fibrinogen and form bridges between adjacent platelets."},{"id":14,"topic":"Hemostasis","question":"Which enzyme is inhibited by aspirin to prevent the synthesis of Thromboxane A2?","options":["Cyclooxygenase","Lipoxygenase","Plasminogen activator","Thrombin"],"answer":0,"explanation":"Aspirin inhibits cyclooxygenase (COX), which is required for platelets to synthesize Thromboxane A2 (TxA2), a potent inducer of platelet aggregation."},{"id":15,"topic":"Thrombosis","question":"Hereditary hypercoagulability is most commonly caused by a mutation in which factor?","options":["Factor VIII (Hemophilia A)","Factor V (Factor V Leiden)","Prothrombin (G20210A)","Antithrombin III"],"answer":1,"explanation":"Factor V Leiden mutation makes Factor V resistant to inactivation by protein C, and is the most common inherited cause of hypercoagulability."},{"id":16,"topic":"Thrombosis","question":"Laminations found within antemortem thrombi that consist of pale platelet/fibrin layers alternating with dark red cell layers are called:","options":["Lines of Zahn","Aschoff bodies","Russell bodies","Psammoma bodies"],"answer":0,"explanation":"Lines of Zahn are alternating pale platelet/fibrin layers and dark red cell layers that signify a thrombus formed in flowing blood before death."},{"id":17,"topic":"Thrombosis","question":"Which type of thrombus is typically associated with stasis and is known as a 'red thrombus'?","options":["Arterial thrombus","Venous thrombus","Mural thrombus","Vegetation"],"answer":1,"explanation":"Venous thrombi form in slow-moving blood, enmeshing more red cells and fewer platelets, giving them a red color."},{"id":18,"topic":"Thrombosis","question":"A 45-year-old woman undergoes major orthopedic surgery. Two days later, she develops pain and swelling in her right calf. The most likely source is a thrombus formed due to:","options":["Turbulence in the femoral artery","Endothelial injury in the saphenous vein","Stasis in the deep leg veins","Hypercoagulability from vitamin K excess"],"answer":2,"explanation":"Prolonged immobilization after surgery reduces the milking action of leg muscles, causing blood stasis that leads to deep vein thrombosis (DVT)."},{"id":19,"topic":"Thrombosis","question":"What is the term for a thrombus that occurs within the chambers of the heart or the aortic lumen?","options":["Occlusive thrombus","Mural thrombus","Vegetative thrombus","Postmortem clot"],"answer":1,"explanation":"Thrombi that form on the walls of the heart chambers or the aortic lumen are called mural thrombi."},{"id":20,"topic":"Thrombosis","question":"Disseminated Intravascular Coagulation (DIC) is best described as:","options":["A primary genetic disorder of platelets","Widespread thrombosis in the microcirculation followed by bleeding","A localized clotting event in the large veins","A deficiency in vitamin K-dependent factors"],"answer":1,"explanation":"DIC is a thrombohemorrhagic disorder where systemic activation of coagulation consumes clotting factors and platelets, paradoxically leading to severe bleeding."},{"id":21,"topic":"Embolism","question":"More than 95% of pulmonary emboli originate from:","options":["Right atrial mural thrombi","Deep vein thrombosis (DVT) in the lower extremities","Vegetations on the mitral valve","Superficial varicose veins"],"answer":1,"explanation":"More than 95% of pulmonary emboli originate from thrombi in the large deep veins of the legs (at or above the knee)."},{"id":22,"topic":"Embolism","question":"A 'saddle embolus' refers to an embolus that lodges at:","options":["The bifurcation of the main pulmonary artery","The circle of Willis","The common iliac artery","The coronary ostium"],"answer":0,"explanation":"A large saddle embolus may straddle the bifurcation of the main pulmonary artery, occluding both branches and causing sudden death."},{"id":23,"topic":"Embolism","question":"The systemic effects of a pulmonary embolism (PE) become life-threatening when what percentage of the pulmonary circulation is obstructed?","options":["10%","30%","60% or more","90%"],"answer":2,"explanation":"When an embolus obstructs 60% or more of the pulmonary circulation, it can cause sudden death or acute right heart failure (cor pulmonale)."},{"id":24,"topic":"Embolism","question":"A 'paradoxical embolism' occurs when a venous embolus:","options":["Returns to the liver via the portal vein","Passes through an interatrial or interventricular defect into the systemic circulation","Dissolves spontaneously before reaching the lungs","Causes an infarct in the lung but not the heart"],"answer":1,"explanation":"A paradoxical embolism occurs when a venous clot bypasses the lungs through a cardiac septal defect (patent foramen ovale) to enter the systemic arterial tree."},{"id":25,"topic":"Embolism","question":"Most systemic arterial emboli (80%) arise from:","options":["Aortic aneurysms","Intracardiac mural thrombi","Atherosclerotic plaques","Paradoxical sources"],"answer":1,"explanation":"80% of systemic arterial emboli arise from mural thrombi within the heart, often associated with myocardial infarcts or atrial fibrillation."},{"id":26,"topic":"Embolism","question":"Which type of embolism is most likely to follow a fracture of a long bone?","options":["Air embolism","Fat embolism","Amniotic fluid embolism","Nitrogen embolism"],"answer":1,"explanation":"Fractures of long bones release microscopic fat globules and bone marrow into the circulation, causing fat embolism."},{"id":27,"topic":"Embolism","question":"The 'bends' and 'chokes' are symptomatic of which condition?","options":["Septic shock","Decompression sickness","Fat embolism syndrome","Cardiogenic shock"],"answer":1,"explanation":"Rapid ascent from high-pressure environments causes nitrogen to bubble out of tissues, leading to joint pain (bends) and respiratory distress (chokes) \u2014 decompression sickness."},{"id":28,"topic":"Infarction","question":"An area of ischemic necrosis caused by occlusion of arterial supply or venous drainage is called:","options":["An abscess","An infarct","A thrombus","A hematoma"],"answer":1,"explanation":"An infarct is an area of ischemic necrosis caused by the occlusion of either the arterial supply or venous drainage of a tissue."},{"id":29,"topic":"Infarction","question":"White (anemic) infarcts are typically seen in:","options":["Loose, spongy tissues like the lung","Tissues with dual circulations","Solid organs with end-arterial circulation (e.g., spleen, kidney)","Organs with extensive venous bypass channels"],"answer":2,"explanation":"White infarcts occur in solid organs with end-arterial circulation (spleen, kidney, heart) where tissue density limits blood seepage into the necrotic area."},{"id":30,"topic":"Infarction","question":"Red (hemorrhagic) infarcts occur in which of the following settings?","options":["Venous occlusions (e.g., testicular torsion)","Solid organs with high tissue density","Sites where flow is never reestablished","End-arterial systems like the heart"],"answer":0,"explanation":"Red infarcts occur in settings where blood can collect in the necrotic zone: venous occlusions, loose spongy tissues (lung), or organs with dual circulation."},{"id":31,"topic":"Embolism","question":"A 22-year-old male with a comminuted femur fracture develops respiratory distress and a petechial rash over his chest 48 hours later. This is characteristic of:","options":["Pulmonary thromboembolism","Fat embolism syndrome","Air embolism from trauma","Acute respiratory distress syndrome"],"answer":1,"explanation":"Fat embolism syndrome presents with the classic triad of respiratory distress, neurologic symptoms, and petechial rash typically 1 to 3 days after a major traumatic fracture."},{"id":32,"topic":"Infarction","question":"The dominant histologic characteristic of most infarctions is:","options":["Liquefactive necrosis","Caseous necrosis","Ischemic coagulative necrosis","Fibrinoid necrosis"],"answer":2,"explanation":"Most organs show ischemic coagulative necrosis following an infarct; it takes 4 to 12 hours for this to be visible microscopically."},{"id":33,"topic":"Infarction","question":"Which organ is an exception to the rule of coagulative necrosis following infarction?","options":["Heart","Kidney","Brain","Spleen"],"answer":2,"explanation":"While other organs undergo coagulative necrosis, infarction of the central nervous system (brain) results in liquefactive necrosis."},{"id":34,"topic":"Embolism","question":"A 32-year-old woman in active labor suddenly develops severe dyspnea, cyanosis, shock, seizures, and DIC. The most likely diagnosis is:","options":["Air embolism","Amniotic fluid embolism","Pulmonary thromboembolism","Cardiogenic shock"],"answer":1,"explanation":"Amniotic fluid embolism is a rare but catastrophic complication of labor characterized by dyspnea, cyanosis, shock, and DIC."},{"id":35,"topic":"Infarction","question":"The most important determinant of whether a vascular occlusion will cause tissue damage is:","options":["The age of the patient","The presence of an alternative (collateral) blood supply","The serum calcium level","The presence of chronic inflammation"],"answer":1,"explanation":"The presence of a collateral blood supply is the single most important determinant of whether vascular occlusion will result in tissue infarction."},{"id":36,"topic":"Infarction","question":"Myocardial cells generally die after how many minutes of total ischemia?","options":["3 to 4 minutes","20 to 30 minutes","2 to 4 hours","12 to 24 hours"],"answer":1,"explanation":"Myocardial cells are very sensitive to hypoxia and undergo irreversible death after only 20 to 30 minutes of total ischemia."},{"id":37,"topic":"Infarction","question":"A 19-year-old male presents with sudden, intense scrotal pain. Physical exam suggests testicular torsion. The resulting infarct will most likely be:","options":["White and anemic","Red and hemorrhagic","Caseous and dry","Fibrotic and scarred"],"answer":1,"explanation":"Testicular torsion causes venous occlusion, which prevents outflow and causes blood to engorge and hemorrhage into the necrotic tissue \u2014 a red infarct."},{"id":38,"topic":"Shock","question":"Shock is defined as a state of systemic circulatory failure that leads to:","options":["Excessive tissue perfusion","Cellular hypoxia","Hyper-metabolic alkalosis","Increased cardiac output"],"answer":1,"explanation":"Shock is a state of circulatory failure that impairs tissue perfusion, leading to systemic cellular hypoxia and metabolic dysfunction."},{"id":39,"topic":"Shock","question":"Hypovolemic shock can result from:","options":["Myocardial infarction","Massive hemorrhage or severe burns","Pulmonary embolism","Cardiac tamponade"],"answer":1,"explanation":"Massive hemorrhage or severe burns significantly reduce the effective circulating blood volume, leading to low cardiac output and hypovolemic shock."},{"id":40,"topic":"Shock","question":"Which type of shock is caused by a dysregulated host response to infection?","options":["Neurogenic shock","Anaphylactic shock","Septic shock","Cardiogenic shock"],"answer":2,"explanation":"Sepsis is defined by life-threatening organ dysfunction caused by a dysregulated host response to infection, leading to septic shock."},{"id":41,"topic":"Infarction","question":"In the brain, an infarct typically results in which form of necrosis?","options":["Coagulative","Caseous","Liquefactive","Fat necrosis"],"answer":2,"explanation":"The brain is the unique exception where ischemia results in liquefactive rather than coagulative necrosis."},{"id":42,"topic":"Shock","question":"During the initial nonprogressive stage of shock, which mechanism helps maintain cardiac output?","options":["Arteriolar dilation","Vagal stimulation","Activation of the renin-angiotensin-aldosterone axis","Metabolic acidosis"],"answer":2,"explanation":"Early compensatory mechanisms include tachycardia, peripheral vasoconstriction, and activation of the renin-angiotensin-aldosterone axis to maintain blood pressure."},{"id":43,"topic":"Shock","question":"The 'Irreversible Stage' of shock is marked by:","options":["Compensation by baroreceptors","Widespread cell injury and lysosomal enzyme leakage","Warm, flushed skin","Restoration of normal pH"],"answer":1,"explanation":"In the irreversible stage, injury is so severe that survival is impossible even if hemodynamics are corrected, due to massive cell injury and lysosomal enzyme leakage."},{"id":44,"topic":"Shock","question":"Which of the following is a major pathogenic factor in septic shock?","options":["Widespread vascular leakage and tissue edema","Intense systemic vasoconstriction","Hyper-responsiveness to insulin","Inhibition of the complement cascade"],"answer":0,"explanation":"In septic shock, cytokines cause endothelial activation leading to widespread vascular leakage and tissue edema, severely compromising nutrient delivery."},{"id":45,"topic":"Hemostasis","question":"Which cells express Protease-Activated Receptors (PARs) that are triggered by thrombin?","options":["Red blood cells","Platelets and inflammatory cells","Adipocytes","Osteoclasts"],"answer":1,"explanation":"Thrombin activates Protease-Activated Receptors (PARs) on platelets and inflammatory cells, linking the coagulation process directly to inflammation and repair."},{"id":46,"topic":"Shock","question":"A patient in the ICU has high fever, low blood pressure, multi-organ failure, and elevated TNF and IL-1. This picture is most consistent with:","options":["Cardiogenic shock","Hypovolemic shock","Septic shock","Neurogenic shock"],"answer":2,"explanation":"High levels of TNF and IL-1 are the primary mediators of the systemic inflammatory response seen in septic shock with multi-organ failure."},{"id":47,"topic":"Shock","question":"Waterhouse-Friderichsen syndrome refers to adrenal insufficiency caused by:","options":["Chronic steroid use","Adrenal hemorrhage/necrosis during DIC/sepsis","Tuberculosis of the adrenal glands","Pituitary adenoma"],"answer":1,"explanation":"Waterhouse-Friderichsen syndrome is a severe complication of septic shock (often meningococcemia) where bilateral adrenal hemorrhage/necrosis causes acute adrenal insufficiency."},{"id":48,"topic":"Shock","question":"A patient presents with cool, clammy skin, tachycardia, and BP of 80/50 mmHg after traumatic injury. These findings indicate which stage of shock?","options":["Nonprogressive stage","Progressive stage","Irreversible stage","Resolving stage"],"answer":0,"explanation":"Cool, clammy skin and tachycardia are signs of the reflex compensatory mechanisms (sympathetic stimulation) active in the initial nonprogressive stage of shock."},{"id":49,"topic":"Hemostasis","question":"What is the primary role of plasmin in the body?","options":["To activate Factor X","To break down fibrin and interfere with its polymerization","To promote platelet adhesion","To stimulate endothelin release"],"answer":1,"explanation":"Plasmin is the primary enzyme of the fibrinolytic system responsible for dissolving clots by breaking down fibrin."},{"id":50,"topic":"Thrombosis","question":"The shift toward a procoagulant state in septic shock is characterized by an increase in the production of:","options":["Thrombomodulin","Protein C","Tissue factor","t-PA"],"answer":2,"explanation":"Sepsis shifts the endothelium to a procoagulant state by increasing expression of tissue factor and decreasing natural anticoagulants like Protein C."}]},{"chapter":4,"title":"Diseases of the Immune System","topics":["Innate Immunity","Adaptive Immunity","Type I Hypersensitivity","Type II Hypersensitivity","Type III Hypersensitivity","Type IV Hypersensitivity","Transplant Rejection","Autoimmunity"],"questions":[{"id":1,"topic":"Innate Immunity","question":"Which component of the immune system provides the first line of defence and reacts immediately to microbes?","options":["Adaptive immunity","Innate immunity","Humoral immunity","Cell-mediated immunity"],"answer":1,"explanation":"Innate immunity is always present and ready to provide immediate defense against microbes, acting as the first line of defense."},{"id":2,"topic":"Innate Immunity","question":"The movement of leukocytes toward a chemical gradient produced by microbes is known as:","options":["Opsonization","Phagocytosis","Chemotaxis","Diapedesis"],"answer":2,"explanation":"Chemotaxis is defined as the movement of leukocytes toward a chemical gradient, such as that produced by bacterial proteins containing N-formylmethionine."},{"id":3,"topic":"Adaptive Immunity","question":"Which cells are the most important antigen-presenting cells for initiating T-cell responses against protein antigens?","options":["Macrophages","B cells","Dendritic cells","Neutrophils"],"answer":2,"explanation":"Dendritic cells are the most important antigen-presenting cells (APCs) for initiating T-lymphocyte responses against protein antigens."},{"id":4,"topic":"Innate Immunity","question":"Toll-like receptors (TLRs) located in endosomal membranes are primarily designed to detect:","options":["Bacterial cell wall lipids","Extracellular proteins","Nucleic acids of ingested microbes","Fungal glycans"],"answer":2,"explanation":"TLRs in endosomal membranes (TLR3, 7, 8, 9) are designed to detect nucleic acids of ingested microbes after phagocytosis."},{"id":5,"topic":"Adaptive Immunity","question":"Which cells are responsible for the production of antibodies?","options":["T lymphocytes","NK cells","Plasma cells","Dendritic cells"],"answer":2,"explanation":"B lymphocytes recognize antigens and differentiate into plasma cells, which function as antibody factories."},{"id":6,"topic":"Adaptive Immunity","question":"Major Histocompatibility Complex (MHC) Class I molecules are expressed on:","options":["All nucleated cells and platelets","Only antigen-presenting cells","Only T lymphocytes","Only red blood cells"],"answer":0,"explanation":"MHC Class I molecules are expressed on all nucleated cells and platelets to allow surveillance by CD8+ cytotoxic T cells."},{"id":7,"topic":"Adaptive Immunity","question":"The process by which B cells produce antibodies with higher affinities for an antigen during a response is called:","options":["Isotype switching","Clonal selection","Affinity maturation","V(D)J recombination"],"answer":2,"explanation":"Affinity maturation occurs in germinal centers, where helper T cells stimulate B cells to produce antibodies with progressively higher affinities for the antigen."},{"id":8,"topic":"Adaptive Immunity","question":"Which cytokine is the most potent activator of macrophages, produced by Th1 cells?","options":["IL-4","IL-5","IFN-\u03b3","IL-17"],"answer":2,"explanation":"Interferon-gamma (IFN-\u03b3) is the signature cytokine of Th1 cells and is the most potent activator of macrophages."},{"id":9,"topic":"Type I Hypersensitivity","question":"In the classification of hypersensitivity, Type I is also known as:","options":["Antibody-mediated","Immune complex-mediated","Immediate hypersensitivity","Cell-mediated"],"answer":2,"explanation":"Type I hypersensitivity is also known as immediate hypersensitivity because it develops within minutes of exposure to an allergen."},{"id":10,"topic":"Type I Hypersensitivity","question":"The primary antibody class involved in Type I hypersensitivity is:","options":["IgG","IgM","IgE","IgA"],"answer":2,"explanation":"Type I hypersensitivity is characterized by the production of IgE antibody in response to environmental antigens (allergens)."},{"id":11,"topic":"Type I Hypersensitivity","question":"A patient presents with a rapid-onset skin rash and difficulty breathing minutes after a bee sting. This reaction is mediated by:","options":["Mast cell degranulation","Complement-mediated lysis","T-cell cytotoxicity","Immune complex deposition"],"answer":0,"explanation":"Type I reactions involve allergen binding to IgE on mast cells, leading to the explosive release of vasoactive amines like histamine causing anaphylaxis."},{"id":12,"topic":"Type I Hypersensitivity","question":"The 'late-phase reaction' of Type I hypersensitivity typically occurs how many hours after exposure?","options":["1\u20132 minutes","2\u201324 hours","48\u201372 hours","7\u201310 days"],"answer":1,"explanation":"A second late-phase reaction often occurs 2 to 24 hours after the initial exposure without further contact with the allergen."},{"id":13,"topic":"Type I Hypersensitivity","question":"Which cell type is characteristically abundant in the inflammatory infiltrate of a late-phase Type I reaction?","options":["Basophils","Neutrophils","Eosinophils","Lymphocytes"],"answer":2,"explanation":"The late-phase reaction is characterized by an inflammatory infiltrate rich in eosinophils, neutrophils, and CD4+ T cells causing tissue destruction."},{"id":14,"topic":"Innate Immunity","question":"Opsonization refers to the process of:","options":["Direct cell lysis by T cells","Coating microbes with antibodies or complement to facilitate phagocytosis","Neutralizing toxins in the blood","Stimulating B cell proliferation"],"answer":1,"explanation":"Opsonization is the coating of microbes with antibodies (IgG) or complement (C3b) to facilitate their recognition and ingestion by phagocytes."},{"id":15,"topic":"Type II Hypersensitivity","question":"Type II hypersensitivity involves which of the following mechanisms?","options":["Deposition of circulating complexes","Production of IgE antibodies","Binding of antibodies to antigens on cell surfaces or matrix","Activation of Th17 cells"],"answer":2,"explanation":"Type II hypersensitivity involves secreted IgG and IgM antibodies binding to fixed antigens on cells or in the extracellular matrix."},{"id":16,"topic":"Type II Hypersensitivity","question":"Which of the following is a clinical example of Type II hypersensitivity?","options":["Serum sickness","Tuberculin reaction","Autoimmune hemolytic anemia","Arthus reaction"],"answer":2,"explanation":"Autoimmune hemolytic anemia is a classic Type II reaction where antibodies bind to red cell membrane proteins, leading to their destruction."},{"id":17,"topic"
